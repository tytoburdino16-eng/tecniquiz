<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TecniQuiz</title>
<!-- Firebase CDN compatible (no módulos) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Nunito',sans-serif;background:#080A0F;color:#F0EDE8;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0F1117}::-webkit-scrollbar-thumb{background:#1E2333;border-radius:2px}
input,button,select,textarea{font-family:'Nunito',sans-serif}
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;background:#0C0E14;border-right:1px solid #1E2333;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:24px}
.sb-logo{padding:16px;border-bottom:1px solid #1E2333}
.sb-logo-name{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700}
.sb-logo-sub{font-size:10px;color:#4B5563;letter-spacing:2px;margin-top:2px;font-family:'JetBrains Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:#64748B;border-left:2px solid transparent;transition:all .15s;font-weight:500}
.nav-item:hover{background:#11141C;color:#F0EDE8}
.nav-item.active{color:#F97316;border-left-color:#F97316;background:#F9731610}
.sb-status{padding:12px 16px;border-top:1px solid #1E2333;font-size:11px;color:#374151;font-family:'JetBrains Mono',monospace;line-height:1.7;margin-top:auto}
.card{background:#0F1117;border:1px solid #1E2333;border-radius:12px;padding:20px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:#4B5563;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:14px}
.btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #1E2333;background:#11141C;color:#9CA3AF;transition:all .14s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn:hover:not(:disabled){background:#181C27;color:#F0EDE8;transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#F97316;border-color:#F97316;color:#080A0F;font-weight:800}
.btn-primary:hover:not(:disabled){background:#EA6C10;color:#080A0F}
.btn-danger{background:#EF444418;border-color:#EF444440;color:#EF4444}
.btn-success{background:#22C55E18;border-color:#22C55E40;color:#22C55E}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-lg{padding:13px 32px;font-size:15px}
.btn-full{width:100%;justify-content:center}
.field-label{font-size:11px;font-weight:700;color:#4B5563;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;display:block;margin-bottom:6px}
input[type=text],input[type=datetime-local],textarea,select{width:100%;background:#080A0F;border:1.5px solid #1E2333;border-radius:8px;padding:11px 14px;color:#F0EDE8;font-size:14px;outline:none;transition:border .15s}
input[type=text]:focus,textarea:focus,select:focus{border-color:#F97316}
textarea{resize:none}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.6px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tag-ore{background:#F9731618;color:#F97316;border:1px solid #F9731635}
.tag-jade{background:#10B98118;color:#10B981;border:1px solid #10B98135}
.tag-sky{background:#38BDF818;color:#38BDF8;border:1px solid #38BDF835}
.tag-gold{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B35}
.tag-red{background:#EF444418;color:#EF4444;border:1px solid #EF444435}
.tag-muted{background:#37415118;color:#6B7280;border:1px solid #37415135}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.pbar{height:5px;background:#1E2333;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;background:#F97316;border-radius:99px;transition:width .5s ease}
.live-dot{width:7px;height:7px;border-radius:50%;background:#10B981;display:inline-block;animation:blink 1.8s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#11141C;border:1px solid #1E2333;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700}
.stat-lbl{font-size:11px;color:#4B5563;margin-top:3px}
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:6px}
.sp{flex:1}
.mb8{margin-bottom:8px}
.mb14{margin-bottom:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{opacity:0;transform:scale(.86)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes tickIn{from{opacity:0;transform:scale(1.3)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideR{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fu{animation:fadeUp .35s cubic-bezier(.2,.85,.3,1) both}
.pop{animation:pop .4s cubic-bezier(.2,.85,.3,1) both}
.sr{animation:slideR .28s ease both}
.overlay{position:fixed;inset:0;background:#000000DD;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#0F1117;border:1px solid #2C3348;border-radius:14px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1E2333}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700}
.modal-body{padding:22px}
.close-btn{background:none;border:none;color:#4B5563;font-size:22px;cursor:pointer;line-height:1}
.code-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:#F97316;letter-spacing:5px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;width:100%;padding:16px 18px;border:2px solid #1E2333;border-radius:10px;background:#0F1117;cursor:pointer;text-align:left;transition:all .14s;color:#F0EDE8;font-size:14px;font-weight:500;line-height:1.35;margin-bottom:10px}
.opt-btn:hover:not(:disabled){border-color:#F97316;background:#F9731612}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:#10B98118;border-color:#10B981;color:#10B981}
.opt-btn.wrong{background:#EF444418;border-color:#EF4444;color:#EF4444}
.opt-btn.reveal{background:#10B98110;border-color:#10B98150}
.opt-letter{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.spin{width:20px;height:20px;border:2px solid #1E2333;border-top-color:#F97316;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;display:inline-block}
#toast{position:fixed;top:16px;right:16px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;background:#181C27;border:1px solid #2C3348;color:#F0EDE8;box-shadow:0 8px 24px #00000080;display:none;max-width:320px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:6px 14px 6px 8px;border-radius:20px;border:1px solid #1E2333;background:#0F1117;font-size:13px;font-weight:500;animation:slideR .25s ease both}
.chip.me{border-color:#F9731650;background:#F9731612;color:#F97316}
@media(max-width:600px){.sidebar{width:52px}.sidebar .sb-logo-name,.sidebar .sb-logo-sub,.sidebar .nav-item span:last-child,.sb-status{display:none}.nav-item{justify-content:center;padding:12px}.main{padding:14px}.stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>

<script>
// ── Firebase init ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyAawa9s6SUOW8oB5Fx1mZOAMu_1PlDcsg8",
  authDomain:        "tecniquiz.firebaseapp.com",
  databaseURL:       "https://tecniquiz-default-rtdb.firebaseio.com",
  projectId:         "tecniquiz",
  storageBucket:     "tecniquiz.firebasestorage.app",
  messagingSenderId: "815651954314",
  appId:             "1:815651954314:web:21826a65a884fb4b119773"
});
var db = firebase.database();

// ── Questions ─────────────────────────────────────────────────
var QDB = [
  {id:1,text:"¿Cuál es la resistencia característica del hormigón H-25?",opts:["15 MPa","20 MPa","25 MPa","30 MPa"],ans:2,topic:"Materiales",diff:"medio"},
  {id:2,text:"¿Qué norma regula el diseño sísmico en Argentina?",opts:["CIRSOC 101","CIRSOC 103","CIRSOC 201","CIRSOC 301"],ans:1,topic:"Normativa",diff:"difícil"},
  {id:3,text:"Recubrimiento mínimo en losa de entrepiso:",opts:["1 cm","2 cm","3 cm","4 cm"],ans:1,topic:"Estructuras",diff:"fácil"},
  {id:4,text:"Peso aproximado de 1 m³ de hormigón armado:",opts:["1800 kg","2000 kg","2400 kg","2800 kg"],ans:2,topic:"Materiales",diff:"fácil"},
  {id:5,text:"Escala más usada en planos de planta:",opts:["1:5","1:50","1:500","1:5000"],ans:1,topic:"Dibujo Técnico",diff:"fácil"},
  {id:6,text:"¿Qué es la cimentación por zapatas?",opts:["Fundación superficial aislada","Fundación profunda continua","Losa de fundación total","Pilotes hincados"],ans:0,topic:"Fundaciones",diff:"medio"},
  {id:7,text:"La flecha en una viga es:",opts:["Deformación vertical máxima","Fuerza horizontal","Torsión axial","Esfuerzo normal"],ans:0,topic:"Estructuras",diff:"medio"},
  {id:8,text:"El módulo de elasticidad relaciona:",opts:["Carga y deformación total","Tensión y deformación unitaria","Resistencia y dureza","Masa y volumen"],ans:1,topic:"Mecánica",diff:"difícil"},
];

// ── Helpers ───────────────────────────────────────────────────
var AVC=["#F97316","#10B981","#F59E0B","#A78BFA","#F43F5E","#38BDF8","#EC4899","#34D399"];
function avCol(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AVC.length;return AVC[h];}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();}
function avHtml(name,size){
  size=size||34;var c=avCol(name);
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+c+'20;border:2px solid '+c+'60;color:'+c+';font-size:'+Math.round(size*.36)+'px">'+ini(name)+'</div>';
}
function diffTag(d){return {fácil:"tag-jade",medio:"tag-gold","difícil":"tag-red"}[d]||"tag-gold";}
var OC=["#F97316","#10B981","#F59E0B","#A78BFA"];
function genCode(){
  var L="ABCDEFGHJKLMNPQRSTUVWXYZ",D="23456789",r="";
  for(var i=0;i<3;i++)r+=L[Math.floor(Math.random()*L.length)];
  r+="-";
  for(var i=0;i<3;i++)r+=D[Math.floor(Math.random()*D.length)];
  return r;
}
function g(id){return document.getElementById(id);}
function h(id,html){var el=g(id);if(el)el.innerHTML=html;}
function toast(msg,type){
  var el=g("toast");type=type||"ok";
  el.textContent=(type==="ok"?"✅ ":type==="err"?"❌ ":"ℹ️ ")+msg;
  el.style.display="block";
  clearTimeout(el._t);el._t=setTimeout(function(){el.style.display="none";},3200);
}

// ── State ─────────────────────────────────────────────────────
var S={
  mode:null, tab:"rooms",
  rooms:[], monitorCode:null, monitorListener:null, monitorData:null,
  timerInterval:null, timerSecs:20,
  stName:"", stRoom:null, stScreen:"join",
  stAnswers:{}, stScore:0, stListener:null, stData:null,
};

// ── RENDER ────────────────────────────────────────────────────
function render(){
  g("app").innerHTML='<div class="sidebar" id="sidebar"></div><div class="main" id="main"></div>';
  renderSidebar();renderMain();
}

function renderSidebar(){
  var nav="";
  if(S.mode==="teacher"){
    var tabs=[{id:"rooms",i:"▣",l:"Mis Salas"},{id:"monitor",i:"◉",l:"Monitor Live"},
              {id:"bank",i:"✦",l:"Preguntas"},{id:"results",i:"▲",l:"Resultados"}];
    nav=tabs.map(function(t){
      return '<div class="nav-item'+(S.tab===t.id?" active":"")+'" onclick="setTab(\''+t.id+'\')"><span style="font-size:15px">'+t.i+'</span><span>'+t.l+'</span></div>';
    }).join("")+'<div style="border-top:1px solid #1E2333;margin-top:8px;padding-top:8px;"><div class="nav-item" onclick="S.mode=null;render()"><span style="font-size:15px">←</span><span>Inicio</span></div></div>';
  } else if(S.mode==="student"){
    nav='<div class="nav-item active"><span style="font-size:15px">🎓</span><span>Alumno</span></div><div style="border-top:1px solid #1E2333;margin-top:8px;padding-top:8px;"><div class="nav-item" onclick="leaveStudent()"><span style="font-size:15px">←</span><span>Inicio</span></div></div>';
  } else {
    nav='<div class="nav-item" onclick="S.mode=\'teacher\';render()"><span style="font-size:15px">⚙</span><span>Docente</span></div><div class="nav-item" onclick="S.mode=\'student\';render()"><span style="font-size:15px">🎓</span><span>Alumno</span></div>';
  }
  var status="";
  if(S.mode==="teacher"&&S.monitorCode) status="Sala:<br>"+S.monitorCode;
  else if(S.mode==="student"&&S.stRoom) status=S.stName+"<br>"+S.stRoom.code;
  h("sidebar",'<div class="sb-logo"><div class="sb-logo-name">TECNI<span style="color:#F97316">QUIZ</span></div><div class="sb-logo-sub">E.T. Nº1 · CONSTR.</div></div><div style="padding:8px 0;flex:1">'+nav+'</div><div class="sb-status">'+status+'</div>');
}

function renderMain(){
  if(!S.mode){h("main",renderHome());return;}
  if(S.mode==="teacher"){
    var fns={rooms:renderRooms,monitor:renderMonitor,bank:renderBank,results:renderResults};
    h("main",(fns[S.tab]||renderRooms)());
    if(S.tab==="monitor") attachMonitor();
    if(S.tab==="rooms") loadRooms();
    if(S.tab==="results") loadResultsInit();
  } else {
    var fns2={join:renderJoin,lobby:renderLobby,quiz:renderQuiz,end:renderEnd};
    h("main",(fns2[S.stScreen]||renderJoin)());
    if(S.stScreen==="lobby"||S.stScreen==="quiz") attachStudentListener();
  }
}

function setTab(t){S.tab=t;render();}

// ── HOME ──────────────────────────────────────────────────────
function renderHome(){
  return '<div style="max-width:520px;margin:60px auto;text-align:center" class="fu">'+
    '<div style="font-size:52px;margin-bottom:18px">🏗️</div>'+
    '<div style="font-family:\'Rajdhani\',sans-serif;font-size:48px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:12px">TECNI<span style="color:#F97316">QUIZ</span></div>'+
    '<p style="color:#6B7280;font-size:16px;line-height:1.75;margin-bottom:42px">Plataforma de evaluación en tiempo real.<br>El docente controla todo desde su panel.<br>Los alumnos solo necesitan un nombre y un código.</p>'+
    '<div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">'+
    '<button class="btn btn-primary btn-lg" onclick="S.mode=\'teacher\';S.tab=\'rooms\';render()">⚙ Panel Docente</button>'+
    '<button class="btn btn-lg" onclick="S.mode=\'student\';S.stScreen=\'join\';render()" style="border-color:#F9731640;color:#F97316">🎓 Soy Alumno</button>'+
    '</div>'+
    '<div style="margin-top:36px;background:#0F1117;border:1px solid #1E2333;border-radius:10px;padding:16px 20px;text-align:left;font-size:13px;color:#6B7280;line-height:1.8">'+
    '<strong style="color:#9CA3AF">¿Cómo funciona?</strong><br>'+
    '1. El docente crea una sala y comparte el código<br>'+
    '2. Los alumnos ingresan desde cualquier celular o PC<br>'+
    '3. El docente da inicio — todos juegan en tiempo real</div></div>';
}

// ── ROOMS ─────────────────────────────────────────────────────
function renderRooms(){
  return '<div class="fu"><div class="row mb14"><h2 style="font-family:\'Rajdhani\',sans-serif;font-size:22px;font-weight:700;flex:1">Mis Salas</h2><button class="btn btn-primary" onclick="openCreate()">＋ Nueva sala</button></div><div id="rooms-list"><div style="text-align:center;padding:40px 0;color:#374151"><div class="spin"></div></div></div></div><div id="create-overlay"></div>';
}

function loadRooms(){
  db.ref("rooms").get().then(function(snap){
    var data=snap.val()||{};
    S.rooms=Object.values(data);
    renderRoomsList();
  });
}

function renderRoomsList(){
  var el=g("rooms-list");if(!el)return;
  if(S.rooms.length===0){
    el.innerHTML='<div style="text-align:center;padding:60px 0;color:#374151"><div style="font-size:40px;margin-bottom:12px;opacity:.3">▣</div><div style="font-size:15px;margin-bottom:16px">No hay salas todavía.</div><button class="btn btn-primary" onclick="openCreate()">＋ Crear primera sala</button></div>';
    return;
  }
  var TC={live:"#F97316",task:"#38BDF8",exam:"#F59E0B",practice:"#10B981"};
  var TL={live:"⚡ Quiz en Vivo",task:"📋 Tarea",exam:"📝 Examen",practice:"🔩 Práctica"};
  var PL={lobby:"EN ESPERA",running:"▶ EN CURSO",ended:"FINALIZADO"};
  var PC={lobby:"tag-gold",running:"tag-ore",ended:"tag-muted"};
  el.innerHTML=S.rooms.map(function(r){
    var c=TC[r.type]||"#F97316";
    var students=Object.values(r.students||{}).filter(function(s){return s.online;});
    var phase=r.phase||"lobby";
    return '<div class="card sr"><div class="row"><div style="width:44px;height:44px;border-radius:10px;background:'+c+'18;border:1px solid '+c+'30;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">'+(r.type==="live"?"⚡":r.type==="task"?"📋":r.type==="exam"?"📝":"🔩")+'</div>'+
    '<div style="flex:1;min-width:0"><div class="row mb8" style="flex-wrap:wrap;gap:6px"><span style="font-weight:700;font-size:15px">'+r.name+'</span><span class="tag tag-ore" style="font-size:10px">'+TL[r.type]+'</span><span class="tag '+PC[phase]+'" style="font-size:10px">'+PL[phase]+'</span></div>'+
    '<div class="row" style="font-size:12px;color:#4B5563;gap:14px"><span class="row" style="gap:6px"><span class="live-dot"></span>'+students.length+' en línea</span><span>❓ '+(r.questions||[]).length+' preguntas</span></div></div>'+
    '<div onclick="copyCode(\''+r.code+'\')" style="background:#080A0F;border:1px solid #1E2333;border-radius:9px;padding:9px 16px;cursor:pointer;flex-shrink:0" onmouseenter="this.style.borderColor=\'#F97316\'" onmouseleave="this.style.borderColor=\'#1E2333\'">'+
    '<div style="font-size:9px;color:#374151;font-family:\'JetBrains Mono\',monospace;letter-spacing:1.5px;margin-bottom:3px">CÓDIGO</div>'+
    '<div style="font-family:\'JetBrains Mono\',monospace;font-size:16px;font-weight:700;color:#F97316;letter-spacing:3px">'+r.code+'</div></div>'+
    '<div class="row" style="gap:7px;flex-shrink:0"><button class="btn btn-sm" onclick="goMonitor(\''+r.code+'\')">◉ Monitor</button>'+
    '<button class="btn btn-sm btn-danger" onclick="deleteRoom(\''+r.code+'\')">✕</button></div></div></div>';
  }).join("");
}

function copyCode(code){
  if(navigator.clipboard) navigator.clipboard.writeText(code).catch(function(){});
  toast("Código "+code+" copiado ✓");
}

function deleteRoom(code){
  if(!confirm("¿Eliminar esta sala?"))return;
  db.ref("rooms/"+code).remove();
  S.rooms=S.rooms.filter(function(r){return r.code!==code;});
  if(S.monitorCode===code){S.monitorCode=null;S.monitorData=null;}
  renderRoomsList();
  toast("Sala eliminada","info");
}

function goMonitor(code){S.monitorCode=code;S.tab="monitor";render();}

// ── CREATE ROOM ───────────────────────────────────────────────
function openCreate(){
  var code=genCode();
  var qList=QDB.map(function(q){
    return '<label style="display:flex;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent" onmouseenter="this.style.background=\'#11141C\'" onmouseleave="this.style.background=\'\'">'+
    '<input type="checkbox" id="qc'+q.id+'" checked style="accent-color:#F97316;flex-shrink:0;margin-top:2px">'+
    '<div><div style="font-size:13px;color:#F0EDE8;line-height:1.4">'+q.text+'</div>'+
    '<div style="margin-top:4px;display:flex;gap:6px"><span class="tag tag-sky" style="font-size:10px">'+q.topic+'</span><span class="tag '+diffTag(q.diff)+'" style="font-size:10px">'+q.diff+'</span></div></div></label>';
  }).join("");
  h("create-overlay",'<div class="overlay" onclick="closeCreate()"><div class="modal" onclick="event.stopPropagation()">'+

function confirmCreate(){

function switchMonitor(code){
  S.monitorCode=code;
  if(S.monitorListener){db.ref("rooms/"+S.monitorCode).off("value",S.monitorListener);S.monitorListener=null;}
  S.monitorData=null;render();
}

function attachMonitor(){
  if(S.monitorListener){db.ref("rooms/"+S.monitorCode).off("value",S.monitorListener);}
  S.monitorListener=db.ref("rooms/"+S.monitorCode).on("value",function(snap){
    S.monitorData=snap.val();
    updateMonitorUI();
  });
}

function updateMonitorUI(){
  var d=S.monitorData;if(!d)return;
  var students=Object.values(d.students||{}).filter(function(s){return s.online;});
  var qs=(d.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);

  var ctrlBtns="";

  else if(phase==="running") ctrlBtns='<button class="btn" onclick="nextQ()" style="border-color:#38BDF840;color:#38BDF8">⏭ Siguiente</button><button class="btn btn-danger" onclick="stopQuiz()">⏹ Detener</button>';

    '<div class="row" style="font-size:12px;color:#4B5563;gap:12px;margin-top:3px">'+
    '<span class="row" style="gap:6px"><span class="live-dot"></span>'+students.length+' en línea</span>'+
    '<span style="font-family:\'JetBrains Mono\',monospace;color:#F97316">'+S.monitorCode+'</span>'+
    (phaseTags[phase]||"")+'</div></div>'+
    '<span class="sp"></span><div class="row" style="gap:8px">'+ctrlBtns+'</div></div>';

  var leftEl=g("monitor-left");if(!leftEl)return;
  if(phase==="lobby"){
    leftEl.innerHTML='<div class="card" style="text-align:center;padding:32px 22px">'+
      '<div style="font-size:11px;color:#374151;font-family:\'JetBrains Mono\',monospace;letter-spacing:2px;margin-bottom:12px">CÓDIGO DE SALA</div>'+
      '<div style="background:#080A0F;border:2px solid #F9731640;border-radius:10px;padding:16px 28px;display:inline-block;margin-bottom:18px"><div class="code-val">'+S.monitorCode+'</div></div>'+
      '<div style="color:#4B5563;font-size:13px;line-height:1.8">Mostrá este código en el pizarrón o envialo por WhatsApp.<br>Los alumnos ingresan desde cualquier dispositivo.</div>'+
      '<div style="margin-top:16px;padding:10px 14px;background:'+(students.length>0?"#10B98115":"#11141C")+';border:1px solid '+(students.length>0?"#10B98140":"#1E2333")+';border-radius:9px;font-size:13px;color:'+(students.length>0?"#10B981":"#374151")+'">'+
      (students.length===0?"Esperando que ingresen los alumnos…":"✓ "+students.length+" alumno"+(students.length!==1?"s":"")+" listo"+(students.length!==1?"s":"")+". Podés iniciar.")+'</div></div>';
  } else if(phase==="running"&&curQ){
    var answered=Object.values(d.answers||{}).filter(function(a){return a[qi]!==undefined;}).length;
    var answPct=Math.round((answered/Math.max(1,students.length))*100);
    leftEl.innerHTML='<div class="card">'+
      '<div class="row mb8" style="flex-wrap:wrap;gap:6px">'+
      '<span class="tag tag-sky" style="font-size:10px">'+(qi+1)+'/'+qs.length+'</span>'+
      '<span class="tag tag-sky" style="font-size:10px">'+curQ.topic+'</span>'+
      '<span class="tag '+diffTag(curQ.diff)+'" style="font-size:10px">'+curQ.diff+'</span>'+

      '<div style="font-family:\'Rajdhani\',sans-serif;font-size:18px;font-weight:600;line-height:1.4;margin-bottom:13px">'+curQ.text+'</div>'+

      }).join("")+

  stEl.innerHTML=students.slice().sort(function(a,b){return(b.score||0)-(a.score||0);}).map(function(s,i){
    var didAns=(d.answers||{})[s.name]&&(d.answers||{})[s.name][qi]!==undefined;
    return '<div class="row sr" style="padding:8px 12px;background:#11141C;border-radius:8px;border:1px solid '+(didAns&&phase==="running"?"#10B98130":"#1E2333")+';margin-bottom:6px">'+

      '<span style="flex:1;font-size:13px;font-weight:600">'+s.name+'</span>'+
      (phase==="running"?'<span style="font-size:11px;font-family:\'JetBrains Mono\',monospace;color:'+(didAns?"#10B981":"#374151")+'">'+(didAns?"✓":"")+'</span>':"")+
      '<span style="font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#F97316">'+(s.score||0).toLocaleString()+'</span></div>';
  }).join("");
}

// ── Quiz control ──────────────────────────────────────────────
function startQuiz(){
  var d=S.monitorData;if(!d)return;
  var students=Object.values(d.students||{}).filter(function(s){return s.online;});
  if(students.length===0)return;
  clearInterval(S.timerInterval);S.timerSecs=20;
  db.ref("rooms/"+S.monitorCode).update({phase:"running",currentQ:0,answers:{}});
  startTeacherTimer();
  toast("¡Quiz iniciado!");
}

function startTeacherTimer(){
  clearInterval(S.timerInterval);S.timerSecs=20;
  S.timerInterval=setInterval(function(){
    S.timerSecs--;
    var tn=g("t-num");var tb=g("t-bar");
    if(tn){tn.textContent=S.timerSecs;tn.style.color=S.timerSecs<=5?"#EF4444":S.timerSecs<=10?"#F59E0B":"#F97316";}
    if(tb)tb.style.width=(S.timerSecs/20)*100+"%";
    if(S.timerSecs<=0){clearInterval(S.timerInterval);nextQ();}
  },1000);
}

function nextQ(){
  clearInterval(S.timerInterval);S.timerSecs=20;
  var d=S.monitorData;if(!d)return;
  var qs=(d.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);
  var next=(d.currentQ||0)+1;
  if(next>=qs.length){
    db.ref("rooms/"+S.monitorCode).update({phase:"ended"});
  } else {
    db.ref("rooms/"+S.monitorCode).update({currentQ:next});
    startTeacherTimer();
  }
}

function stopQuiz(){
  clearInterval(S.timerInterval);S.timerSecs=20;
  db.ref("rooms/"+S.monitorCode).update({phase:"lobby",currentQ:0,answers:{}});
  toast("Sala volvió al lobby.","info");
}

function studentJoin(){
  var name=g("st-name").value.trim();
  var code=g("st-code").value.trim().toUpperCase();
  var errEl=g("st-err");errEl.style.display="none";
  if(!name){errEl.textContent="Ingresá tu nombre completo.";errEl.style.display="block";return;}
  if(!code||code.length<4){errEl.textContent="Código demasiado corto.";errEl.style.display="block";return;}
  db.ref("rooms/"+code).get().then(function(snap){
    if(!snap.exists()){errEl.textContent="Código incorrecto. Verificá con tu docente.";errEl.style.display="block";return;}
    var room=snap.val();
    if(room.phase==="ended"){errEl.textContent="Esta sala ya terminó.";errEl.style.display="block";return;}
    S.stName=name;S.stRoom=room;S.stAnswers={};S.stScore=0;
    db.ref("rooms/"+code+"/students/"+name).set({name:name,score:0,online:true,joinedAt:Date.now()});
    S.stScreen=room.phase==="running"?"quiz":"lobby";
    render();toast("¡Bienvenido "+name+"!");
  });
}

function renderQuiz(){
  var d=S.stData||{};
  var qi=d.currentQ||0;
  var qs=(S.stRoom.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);
  var q=qs[qi];
  if(!q) return '<div style="text-align:center;padding:60px 0;color:#374151">Cargando…</div>';
  var myAns=S.stAnswers[qi];
  var answered=myAns!==undefined;
  var secs=S.timerSecs;
  var R=44,CIRC=2*Math.PI*R;
  var col=secs<=5?"#EF4444":secs<=10?"#F59E0B":"#10B981";
  var feedback="";
  if(answered){
    feedback='<div class="fu" style="margin-top:14px;padding:14px 18px;border-radius:10px;background:'+(myAns===q.ans?"#10B98114":"#EF444414")+';border:1px solid '+(myAns===q.ans?"#10B98140":"#EF444440")+';display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'+
      '<div><div style="font-family:\'Rajdhani\',sans-serif;font-size:17px;font-weight:700;color:'+(myAns===q.ans?"#10B981":"#EF4444")+'">'+(myAns===q.ans?"✓ ¡CORRECTO!":"✗ INCORRECTO")+'</div>'+
      (myAns!==q.ans?'<div style="font-size:13px;color:#6B7280;margin-top:3px">Correcta: <strong style="color:#10B981">'+q.opts[q.ans]+'</strong></div>':"")+
      '</div>'+(myAns===q.ans?'<div style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:700;color:#10B981;background:#10B98120;padding:5px 14px;border-radius:8px">+'+Math.max(100,Math.round((secs/20)*800)+200)+' pts</div>':"")+
      '<div style="font-size:12px;color:#374151">Esperando al docente…</div></div>';
  }
  return '<div style="max-width:680px;margin:0 auto" class="fu">'+
    '<div class="pbar" style="margin-bottom:14px"><div class="pbar-fill" style="width:'+((qi+1)/qs.length*100)+'%"></div></div>'+
    '<div class="row mb14" style="flex-wrap:wrap;gap:8px">'+
    '<span class="tag tag-ore" style="font-size:10px">'+(qi+1)+'/'+qs.length+'</span>'+
    '<span class="tag tag-sky" style="font-size:10px">'+q.topic+'</span>'+
    '<span class="sp"></span>'+
    '<span style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:700;color:#F97316;background:#F9731618;padding:4px 12px;border-radius:8px">⭐ '+S.stScore.toLocaleString()+'</span></div>'+
    '<div style="display:flex;gap:18px;align-items:flex-start">'+
    '<div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:4px">'+
    '<div style="position:relative;width:104px;height:104px">'+
    '<svg width="104" height="104" style="transform:rotate(-90deg)">'+
    '<circle cx="52" cy="52" r="'+R+'" fill="none" stroke="#1E2333" stroke-width="6"/>'+
    '<circle id="tc" cx="52" cy="52" r="'+R+'" fill="none" stroke="'+col+'" stroke-width="6" stroke-linecap="round" stroke-dasharray="'+CIRC.toFixed(1)+'" stroke-dashoffset="'+(CIRC*(1-Math.max(0,secs/20))).toFixed(1)+'" style="transition:stroke-dashoffset .9s linear,stroke .4s"/>'+
    '</svg>'+
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'+
    '<span id="tn" style="font-family:\'Rajdhani\',sans-serif;font-size:28px;font-weight:700;color:'+col+';line-height:1">'+secs+'</span>'+
    '<span style="font-size:10px;color:#374151;font-family:\'JetBrains Mono\',monospace;letter-spacing:1px">SEG</span></div></div>'+
    (answered?'<div style="font-size:11px;color:#374151;text-align:center;margin-top:8px;line-height:1.5">Esperando<br>docente…</div>':"")+
    '</div>'+
    '<div style="flex:1;min-width:0">'+
    '<div class="card" style="margin-bottom:12px"><div style="font-family:\'Rajdhani\',sans-serif;font-size:19px;font-weight:600;line-height:1.45">'+q.text+'</div></div>'+
    q.opts.map(function(opt,i){
      var cls="opt-btn";
      if(answered){if(i===q.ans)cls+=" reveal";if(i===myAns)cls+=myAns===q.ans?" correct":" wrong";}
      return '<button class="'+cls+'" onclick="studentPick('+i+')" '+(answered?"disabled":"")+'>'+
        '<span class="opt-letter" style="background:'+OC[i]+'20;color:'+(answered?(i===q.ans?"#10B981":i===myAns?"#EF4444":"#374151"):OC[i])+';border:1.5px solid '+OC[i]+'40">'+String.fromCharCode(65+i)+'</span>'+
        '<span>'+opt+'</span></button>';
    }).join("")+
    feedback+'</div></div></div>';
}

function studentPick(i){
  var d=S.stData||{};var qi=d.currentQ||0;
  if(S.stAnswers[qi]!==undefined)return;
  S.stAnswers[qi]=i;
  var qs=(S.stRoom.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);
  var q=qs[qi];if(!q)return;
  var correct=i===q.ans;
  var pts=correct?Math.max(100,Math.round((S.timerSecs/20)*800)+200):0;
  if(correct)S.stScore+=pts;
  db.ref("rooms/"+S.stRoom.code+"/students/"+S.stName).update({score:S.stScore});
  db.ref("rooms/"+S.stRoom.code+"/answers/"+S.stName).update({[qi]:i});
  h("main",renderQuiz());
}

// ── STUDENT END ───────────────────────────────────────────────
function renderEnd(){
  var d=S.stData||{};
  var qs=(S.stRoom.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);
  var correct=qs.filter(function(q,i){return S.stAnswers[i]===q.ans;}).length;
  var pct=Math.round((correct/Math.max(1,qs.length))*100);
  var all=Object.values(d.students||{}).sort(function(a,b){return(b.score||0)-(a.score||0);});
  var rank=all.findIndex(function(s){return s.name===S.stName;})+1;
  var myScore=(d.students&&d.students[S.stName]&&d.students[S.stName].score)||S.stScore||0;
  return '<div style="max-width:500px;margin:28px auto" class="pop">'+
    '<div style="text-align:center;margin-bottom:22px">'+
    '<div style="font-size:56px;margin-bottom:10px">'+(rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":pct>=70?"🏆":"💪")+'</div>'+
    '<h1 style="font-family:\'Rajdhani\',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px">'+(pct>=70?"¡EXCELENTE TRABAJO!":pct>=50?"¡BUEN INTENTO!":"¡A SEGUIR PRACTICANDO!")+'</h1>'+
    '<div style="color:#4B5563">'+S.stName+'</div></div>'+
    '<div class="stat-grid" style="margin-bottom:14px">'+
    '<div class="stat-card"><div class="stat-val" style="color:#F97316">'+myScore.toLocaleString()+'</div><div class="stat-lbl">Puntaje</div></div>'+
    '<div class="stat-card"><div class="stat-val" style="color:#10B981">'+correct+'/'+qs.length+'</div><div class="stat-lbl">Correctas</div></div>'+
    '<div class="stat-card"><div class="stat-val" style="color:#F59E0B">#'+(rank||"—")+'</div><div class="stat-lbl">Posición</div></div></div>'+
    '<div class="card" style="margin-bottom:14px"><div class="row" style="margin-bottom:8px;font-size:13px"><span>Precisión</span><span class="sp"></span><span style="font-weight:700;color:'+(pct>=70?"#10B981":pct>=50?"#F59E0B":"#EF4444")+'">'+pct+'%</span></div>'+
    '<div class="pbar" style="height:7px"><div class="pbar-fill" style="width:'+pct+'%;background:'+(pct>=70?"#10B981":pct>=50?"#F59E0B":"#EF4444")+'"></div></div></div>'+
    (all.length>1?'<div class="card" style="margin-bottom:16px"><div class="card-title">Clasificación final</div>'+
    all.map(function(s,i){return '<div class="row sr" style="padding:9px 13px;border-radius:8px;margin-bottom:6px;background:'+(s.name===S.stName?"#F9731612":"#11141C")+';border:1px solid '+(s.name===S.stName?"#F9731640":"#1E2333")+'">'+
      '<span style="width:24px;text-align:center">'+(i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1))+'</span>'+avHtml(s.name,26)+
      '<span style="flex:1;font-size:13px;font-weight:'+(s.name===S.stName?"700":"500")+';color:'+(s.name===S.stName?"#F97316":"#F0EDE8")+'">'+s.name+'</span>'+
      '<span style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:700;color:'+(s.name===S.stName?"#F97316":"#4B5563")+'">'+(s.score||0).toLocaleString()+'</span></div>';}).join("")+'</div>':"")+'<div style="display:flex;gap:10px"><button class="btn btn-primary btn-full" onclick="leaveStudent()">Entrar a otra sala</button><button class="btn btn-full" onclick="S.mode=null;render()">Inicio</button></div></div>';
}

function leaveStudent(){
  if(S.stListener){db.ref("rooms/"+S.stRoom.code).off("value",S.stListener);S.stListener=null;}
  if(S.stRoom&&S.stName) db.ref("rooms/"+S.stRoom.code+"/students/"+S.stName).update({online:false}).catch(function(){});
  S.stScreen="join";S.stRoom=null;S.stName="";S.stAnswers={};S.stScore=0;S.stData=null;render();
}

// ── Student listener ──────────────────────────────────────────
function attachStudentListener(){
  if(S.stListener){db.ref("rooms/"+S.stRoom.code).off("value",S.stListener);}
  S.stListener=db.ref("rooms/"+S.stRoom.code).on("value",function(snap){
    var data=snap.val();
    var prevPhase=S.stData?S.stData.phase:null;
    var prevQ=S.stData?S.stData.currentQ:-1;
    S.stData=data;
    if(prevPhase==="lobby"&&data&&data.phase==="running"){
      S.stAnswers={};S.stScore=0;S.timerSecs=20;
      S.stScreen="quiz";render();startStudentTimer();return;
    }
    if(data&&data.phase==="ended"&&S.stScreen!=="end"){
      clearInterval(S.timerInterval);S.stScreen="end";render();return;
    }
    if(data&&data.phase==="lobby"&&prevPhase&&prevPhase!=="lobby"&&S.stScreen!=="join"){
      clearInterval(S.timerInterval);S.stScreen="lobby";S.stAnswers={};S.stScore=0;render();return;
    }
    if(data&&data.currentQ!==undefined&&data.currentQ!==prevQ&&S.stScreen==="quiz"){
      delete S.stAnswers[data.currentQ];S.timerSecs=20;
      startStudentTimer();render();return;
    }
    if(S.stScreen==="lobby"){
      var el=g("lobby-students");if(!el)return;
      var students=Object.values(data&&data.students?data.students:{}).filter(function(s){return s.online;});
      el.innerHTML=students.length===0?'<span style="color:#374151;font-size:13px">Sos el primero en entrar 🎉</span>':
        students.map(function(s){return '<div class="chip'+(s.name===S.stName?" me":"")+'">'+avHtml(s.name,24)+'<span>'+s.name+(s.name===S.stName?" (vos)":"")+'</span></div>';}).join("");
    }
  });
}

function startStudentTimer(){
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(function(){
    S.timerSecs=Math.max(0,S.timerSecs-1);
    var tcEl=g("tc");var tnEl=g("tn");
    if(!tcEl){clearInterval(S.timerInterval);return;}
    var R=44,CIRC=2*Math.PI*R;
    var col=S.timerSecs<=5?"#EF4444":S.timerSecs<=10?"#F59E0B":"#10B981";
    tcEl.style.stroke=col;
    tcEl.style.strokeDashoffset=(CIRC*(1-Math.max(0,S.timerSecs/20))).toFixed(1);
    if(tnEl){tnEl.textContent=S.timerSecs;tnEl.style.color=col;}
    if(S.timerSecs<=0)clearInterval(S.timerInterval);
  },1000);
}

// ── Init ──────────────────────────────────────────────────────
render();
</script>
</body>
</html>
