  {id:56,text:"¿Qué es la granulometría de los áridos?",opts:["El color de los áridos","La distribución de tamaños de las partículas","El peso específico","La dureza superficial"],ans:1,topic:"Materiales de Construcción",diff:"medio"},
  {id:57,text:"¿Cuál es la principal ventaja del DVH (doble vidriado hermético)?",opts:["Mayor resistencia mecánica","Mejor aislación térmica y acústica","Menor peso","Mayor transparencia"],ans:1,topic:"Materiales de Construcción",diff:"fácil"},

  // ── ESTÁTICA Y RESISTENCIA DE MATERIALES ───────
  {id:61,text:"¿Qué es el momento de una fuerza respecto a un punto?",opts:["La suma de las fuerzas","El producto de la fuerza por su distancia perpendicular al punto","La división fuerza/distancia","El cociente entre fuerza y masa"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"fácil"},
  {id:62,text:"El Teorema de Varignon establece que:",opts:["La suma de fuerzas es cero en equilibrio","El momento resultante es igual a la suma algebraica de los momentos de las fuerzas componentes","Las fuerzas se anulan entre sí","El baricentro coincide con el centro de gravedad"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:63,text:"¿Qué es el baricentro de una sección?",opts:["El punto de máxima resistencia","El centro geométrico o centro de gravedad de una sección","El punto de menor tensión","La fibra neutra superior"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"fácil"},
  {id:64,text:"La ley de Hooke establece que:",opts:["La deformación es inversamente proporcional a la tensión","La tensión es directamente proporcional a la deformación unitaria (en el rango elástico)","La resistencia aumenta con la temperatura","La flexión depende del momento de inercia únicamente"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:65,text:"¿Qué es el módulo de elasticidad (E)?",opts:["Tensión dividida área","Relación entre tensión normal y deformación unitaria","Resistencia última del material","Momento de inercia / área"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:66,text:"Una viga simplemente apoyada con carga central tiene la flecha máxima en:",opts:["En los apoyos","En el cuarto de la luz","En el centro del vano","Siempre en el tercio"],ans:2,topic:"Estática y Resistencia de Materiales",diff:"fácil"},
  {id:67,text:"¿Qué es el momento de inercia de una sección?",opts:["El área de la sección","La resistencia de la sección a doblarse, relacionada con la distribución de área respecto al eje neutro","El peso por unidad de longitud","La tensión admisible"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:68,text:"El Teorema de Steiner (eje paralelo) permite:",opts:["Calcular reacciones en apoyos","Trasladar el momento de inercia de un eje que pasa por el baricentro a un eje paralelo","Calcular tensiones de flexión","Determinar el peso propio"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"difícil"},
  {id:69,text:"¿Qué tipo de vínculo es un apoyo fijo (empotramiento)?",opts:["Solo impide traslación vertical","Solo impide traslación horizontal","Impide traslación en todas las direcciones y la rotación","Solo impide la rotación"],ans:2,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:70,text:"Una estructura isostáticamente sustentada tiene:",opts:["Infinitas soluciones de equilibrio","El número de incógnitas igual al número de ecuaciones de equilibrio disponibles","Siempre dos apoyos","Solo cargas puntuales"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"difícil"},
  {id:71,text:"¿Qué es el pandeo en una columna?",opts:["La flexión lateral de una barra comprimida al superar la carga crítica de Euler","La rotura por tracción","La torsión por carga horizontal","La compresión simple"],ans:0,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:72,text:"¿Qué representa el diagrama de momento flector en una viga?",opts:["Las fuerzas de reacción","La variación del momento flector a lo largo de la viga","Las tensiones de corte","Las deformaciones"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"fácil"},
  {id:73,text:"La tensión admisible es:",opts:["La tensión de rotura del material","La tensión máxima permitida en servicio, obtenida dividiendo la resistencia por el coeficiente de seguridad","La tensión de fluencia","La tensión de pandeo"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:74,text:"¿Cuál es la unidad del módulo de elasticidad?",opts:["Kg","MPa (o N/mm²)","Adimensional","Kg/m"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"fácil"},
  {id:75,text:"En un reticulado, las barras solo trabajan a:",opts:["Flexión y corte","Tracción o compresión axial pura","Torsión","Flexión pura"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:76,text:"¿Qué es la torsión en una barra?",opts:["Flexión en dos planos","Giro de la sección transversal por un momento torsor","Alargamiento axial","Compresión lateral"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"medio"},
  {id:77,text:"El módulo resistente W de una sección se define como:",opts:["I/y (momento de inercia dividido la distancia a la fibra extrema)","Área × tensión","Fuerza × brazo","I × E"],ans:0,topic:"Estática y Resistencia de Materiales",diff:"difícil"},
  {id:78,text:"¿Cuántas ecuaciones de equilibrio estático hay para un sistema plano?",opts:["2","3","4","6"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"fácil"},
  {id:79,text:"El coeficiente de Poisson relaciona:",opts:["Tensión y deformación longitudinal","Deformación lateral y deformación longitudinal","Fuerza y área","Temperatura y deformación"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"difícil"},
  {id:80,text:"¿Qué es la flecha en una viga?",opts:["La tensión máxima","La deformación vertical máxima","La reacción en los apoyos","El momento flector máximo"],ans:1,topic:"Estática y Resistencia de Materiales",diff:"fácil"},

  {id:89,text:"El método de los estados límite en hormigón armado contempla:",opts:["Solo la resistencia última","Estado límite último (rotura) y estado límite de servicio (fisuración, deformación)","Solo las deformaciones","Solo la durabilidad"],ans:1,topic:"Hormigón Armado",diff:"difícil"},

  {id:94,text:"La fisuración del hormigón a tracción es perjudicial porque:",opts:["Aumenta el peso de la estructura","Expone las armaduras a la corrosión y reduce la durabilidad","Reduce la resistencia a compresión","Aumenta la flecha"],ans:1,topic:"Hormigón Armado",diff:"medio"},

var AVC=["#F97316","#10B981","#F59E0B","#A78BFA","#F43F5E","#38BDF8","#EC4899","#34D399","#6366F1","#F59E0B"];
function avCol(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AVC.length;return AVC[h];}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();}
function avHtml(name,size){
  size=size||34;var c=avCol(name);
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+c+'20;border:2px solid '+c+'60;color:'+c+';font-size:'+Math.round(size*.36)+'px">'+ini(name)+'</div>';
}

function genCode(){
  var L="ABCDEFGHJKLMNPQRSTUVWXYZ",D="23456789",r="";
  for(var i=0;i<3;i++)r+=L[Math.floor(Math.random()*L.length)];
  r+="-";for(var i=0;i<3;i++)r+=D[Math.floor(Math.random()*D.length)];
  return r;
}

  el.style.display="block";clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display="none";},3200);
}

      curQ.opts.map(function(o,i){return '<div style="padding:7px 10px;border-radius:7px;font-size:12px;background:'+(i===curQ.ans?"#10B98115":"#080A0F")+';border:1px solid '+(i===curQ.ans?"#10B98150":"#1E2333")+';display:flex;gap:6px;align-items:center"><span style="width:18px;height:18px;border-radius:4px;background:#F9731620;color:#F97316;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+String.fromCharCode(65+i)+'</span><span style="color:'+(i===curQ.ans?"#10B981":"#4B5563")+'">'+o+'</span></div>';}).join("")+
      '</div><div class="row"><span style="font-size:12px;color:#374151">'+answered+'/'+students.length+' respondieron</span><span class="sp"></span><div style="width:100px"><div class="pbar"><div class="pbar-fill" style="width:'+answPct+'%;background:#10B981"></div></div></div></div></div>';
  } else if(phase==="ended"){
    clearInterval(S.timerInterval);
    leftEl.innerHTML='<div class="card" style="text-align:center;padding:32px 20px"><div style="font-size:44px;margin-bottom:10px">🏆</div><div style="font-family:\'Rajdhani\',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">Quiz finalizado</div><div style="color:#4B5563">'+students.length+' participantes</div></div>';
  }
  var countEl=g("mon-count");if(countEl)countEl.textContent=students.length;
  var stEl=g("mon-students");if(!stEl)return;
  if(students.length===0){stEl.innerHTML='<div style="text-align:center;padding:28px 0;color:#374151;font-size:13px">Esperando alumnos…</div>';return;}
  var qi2=d.currentQ||0;
  stEl.innerHTML=students.slice().sort(function(a,b){return(b.score||0)-(a.score||0);}).map(function(s,i){
    var didAns=(d.answers||{})[s.name]&&(d.answers||{})[s.name][qi2]!==undefined;
    return '<div class="row sr" style="padding:8px 12px;background:#11141C;border-radius:8px;border:1px solid '+(didAns&&phase==="running"?"#10B98130":"#1E2333")+';margin-bottom:6px">'+
      '<span style="font-size:14px;width:22px;text-align:center">'+(i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1))+'</span>'+
      avHtml(s.name,28)+'<span style="flex:1;font-size:13px;font-weight:600">'+s.name+'</span>'+
      (phase==="running"?'<span style="font-size:11px;font-family:\'JetBrains Mono\',monospace;color:'+(didAns?"#10B981":"#374151")+'">'+(didAns?"✓":"")+'</span>':"")+
      '<span style="font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#F97316">'+(s.score||0).toLocaleString()+'</span></div>';
  }).join("");
}

function startQuiz(){
  var d=S.monitorData;if(!d)return;
  var students=Object.values(d.students||{}).filter(function(s){return s.online;});
  if(students.length===0)return;
  clearInterval(S.timerInterval);S.timerSecs=20;
  db.ref("rooms/"+S.monitorCode).update({phase:"running",currentQ:0,answers:{}});
  startTeacherTimer();toast("¡Quiz iniciado!");
}

function startTeacherTimer(){
  clearInterval(S.timerInterval);S.timerSecs=20;
  S.timerInterval=setInterval(function(){
    S.timerSecs--;
    var tn=g("t-num");var tb=g("t-bar");
    if(tn){tn.textContent=S.timerSecs;tn.style.color=S.timerSecs<=5?"#EF4444":S.timerSecs<=10?"#F59E0B":"#F97316";}
    if(tb)tb.style.width=(S.timerSecs/20)*100+"%";
    if(S.timerSecs<=0){clearInterval(S.timerInterval);nextQ();}
  },1000);
}

function nextQ(){
  clearInterval(S.timerInterval);S.timerSecs=20;
  var d=S.monitorData;if(!d)return;
  var qs=(d.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);
  var next=(d.currentQ||0)+1;
  if(next>=qs.length){db.ref("rooms/"+S.monitorCode).update({phase:"ended"});}
  else{db.ref("rooms/"+S.monitorCode).update({currentQ:next});startTeacherTimer();}
}

function stopQuiz(){
  clearInterval(S.timerInterval);S.timerSecs=20;
  db.ref("rooms/"+S.monitorCode).update({phase:"lobby",currentQ:0,answers:{}});
  toast("Sala volvió al lobby.","info");
}

function studentJoin(){
  var name=g("st-name").value.trim();var code=g("st-code").value.trim().toUpperCase();
  var errEl=g("st-err");errEl.style.display="none";
  if(!name){errEl.textContent="Ingresá tu nombre completo.";errEl.style.display="block";return;}
  if(!code||code.length<4){errEl.textContent="Código demasiado corto.";errEl.style.display="block";return;}
  db.ref("rooms/"+code).get().then(function(snap){
    if(!snap.exists()){errEl.textContent="Código incorrecto. Verificá con tu docente.";errEl.style.display="block";return;}
    var room=snap.val();
    if(room.phase==="ended"){errEl.textContent="Esta sala ya terminó.";errEl.style.display="block";return;}
    S.stName=name;S.stRoom=room;S.stAnswers={};S.stScore=0;
    db.ref("rooms/"+code+"/students/"+name).set({name:name,score:0,online:true,joinedAt:Date.now()});
    S.stScreen=room.phase==="running"?"quiz":"lobby";render();toast("¡Bienvenido "+name+"!");
  });
}

  }

    '<div class="pbar" style="margin-bottom:12px"><div class="pbar-fill" style="width:'+((qi+1)/qs.length*100)+'%"></div></div>'+
    '<div class="row mb12" style="flex-wrap:wrap;gap:7px"><span class="tag" style="font-size:10px;background:'+tc+'18;color:'+tc+';border:1px solid '+tc+'35">'+(qi+1)+'/'+qs.length+'</span><span class="tag" style="font-size:10px;background:'+tc+'18;color:'+tc+';border:1px solid '+tc+'35">'+q.topic+'</span><span class="sp"></span><span style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:700;color:#F97316;background:#F9731618;padding:4px 12px;border-radius:8px">⭐ '+S.stScore.toLocaleString()+'</span></div>'+

      var cls="opt-btn";if(answered){if(i===q.ans)cls+=" reveal";if(i===myAns)cls+=myAns===q.ans?" correct":" wrong";}
      return '<button class="'+cls+'" onclick="studentPick('+i+')" '+(answered?"disabled":"")+'>'+
        '<span class="opt-letter" style="background:'+OC[i]+'20;color:'+(answered?(i===q.ans?"#10B981":i===myAns?"#EF4444":"#374151"):OC[i])+';border:1.5px solid '+OC[i]+'40">'+String.fromCharCode(65+i)+'</span>'+

function studentPick(i){
  var d=S.stData||{};var qi=d.currentQ||0;
  if(S.stAnswers[qi]!==undefined)return;S.stAnswers[qi]=i;
  var qs=(S.stRoom.questions||[]).map(function(id){return QDB.find(function(q){return q.id===id;});}).filter(Boolean);
  var q=qs[qi];if(!q)return;
  var correct=i===q.ans;var pts=correct?Math.max(100,Math.round((S.timerSecs/20)*800)+200):0;
  if(correct)S.stScore+=pts;
  db.ref("rooms/"+S.stRoom.code+"/students/"+S.stName).update({score:S.stScore});
  db.ref("rooms/"+S.stRoom.code+"/answers/"+S.stName).update({[qi]:i});
  h("main",renderQuiz());
}

  var pct=Math.round((correct/Math.max(1,qs.length))*100);
  var all=Object.values(d.students||{}).sort(function(a,b){return(b.score||0)-(a.score||0);});
  var rank=all.findIndex(function(s){return s.name===S.stName;})+1;

    '<div style="color:#4B5563">'+S.stName+'</div></div>'+
    '<div class="stat-grid" style="margin-bottom:14px"><div class="stat-card"><div class="stat-val" style="color:#F97316">'+myScore.toLocaleString()+'</div><div class="stat-lbl">Puntaje</div></div><div class="stat-card"><div class="stat-val" style="color:#10B981">'+correct+'/'+qs.length+'</div><div class="stat-lbl">Correctas</div></div><div class="stat-card"><div class="stat-val" style="color:#F59E0B">#'+(rank||"—")+'</div><div class="stat-lbl">Posición</div></div></div>'+
    '<div class="card" style="margin-bottom:14px"><div class="row" style="margin-bottom:8px;font-size:13px"><span>Precisión</span><span class="sp"></span><span style="font-weight:700;color:'+(pct>=70?"#10B981":pct>=50?"#F59E0B":"#EF4444")+'">'+pct+'%</span></div><div class="pbar" style="height:7px"><div class="pbar-fill" style="width:'+pct+'%;background:'+(pct>=70?"#10B981":pct>=50?"#F59E0B":"#EF4444")+'"></div></div></div>'+
    (all.length>1?'<div class="card" style="margin-bottom:16px"><div class="card-title">Clasificación final</div>'+
    all.map(function(s,i){return '<div class="row sr" style="padding:9px 13px;border-radius:8px;margin-bottom:6px;background:'+(s.name===S.stName?"#F9731612":"#11141C")+';border:1px solid '+(s.name===S.stName?"#F9731640":"#1E2333")+'"><span style="width:24px;text-align:center">'+(i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1))+'</span>'+avHtml(s.name,26)+'<span style="flex:1;font-size:13px;font-weight:'+(s.name===S.stName?"700":"500")+';color:'+(s.name===S.stName?"#F97316":"#F0EDE8")+'">'+s.name+'</span><span style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:700;color:'+(s.name===S.stName?"#F97316":"#4B5563")+'">'+(s.score||0).toLocaleString()+'</span></div>';}).join("")+'</div>':"")+'<div style="display:flex;gap:10px"><button class="btn btn-primary btn-full" onclick="leaveStudent()">Jugar de nuevo</button><button class="btn btn-full" onclick="S.mode=null;render()">Inicio</button></div></div>';
}

function leaveStudent(){
  if(S.stListener){db.ref("rooms/"+S.stRoom.code).off("value",S.stListener);S.stListener=null;}
  if(S.stRoom&&S.stName)db.ref("rooms/"+S.stRoom.code+"/students/"+S.stName).update({online:false}).catch(function(){});
  S.stScreen="join";S.stRoom=null;S.stName="";S.stAnswers={};S.stScore=0;S.stData=null;render();
}

// ── STUDENT LISTENER ───────────────────────────
function attachStudentListener(){
  if(S.stListener){db.ref("rooms/"+S.stRoom.code).off("value",S.stListener);}
  S.stListener=db.ref("rooms/"+S.stRoom.code).on("value",function(snap){
    var data=snap.val();var prevPhase=S.stData?S.stData.phase:null;var prevQ=S.stData?S.stData.currentQ:-1;
    S.stData=data;
    if(prevPhase==="lobby"&&data&&data.phase==="running"){S.stAnswers={};S.stScore=0;S.timerSecs=20;S.stScreen="quiz";render();startStudentTimer();return;}
    if(data&&data.phase==="ended"&&S.stScreen!=="end"){clearInterval(S.timerInterval);S.stScreen="end";render();return;}
    if(data&&data.phase==="lobby"&&prevPhase&&prevPhase!=="lobby"&&S.stScreen!=="join"){clearInterval(S.timerInterval);S.stScreen="lobby";S.stAnswers={};S.stScore=0;render();return;}
    if(data&&data.currentQ!==undefined&&data.currentQ!==prevQ&&S.stScreen==="quiz"){delete S.stAnswers[data.currentQ];S.timerSecs=20;startStudentTimer();render();return;}
    if(S.stScreen==="lobby"){
      var el=g("lobby-students");if(!el)return;
      var students=Object.values(data&&data.students?data.students:{}).filter(function(s){return s.online;});
      el.innerHTML=students.length===0?'<span style="color:#374151;font-size:13px">Sos el primero en entrar 🎉</span>':
        students.map(function(s){return '<div class="chip'+(s.name===S.stName?" me":"")+'">'+avHtml(s.name,24)+'<span>'+s.name+(s.name===S.stName?" (vos)":"")+'</span></div>';}).join("");
    }
  });
}

function startStudentTimer(){
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(function(){
    S.timerSecs=Math.max(0,S.timerSecs-1);
    var tcEl=g("tc");var tnEl=g("tn");if(!tcEl){clearInterval(S.timerInterval);return;}
    var R=44,CIRC=2*Math.PI*R;
    var col=S.timerSecs<=5?"#EF4444":S.timerSecs<=10?"#F59E0B":"#10B981";
    tcEl.style.stroke=col;tcEl.style.strokeDashoffset=(CIRC*(1-Math.max(0,S.timerSecs/20))).toFixed(1);
    if(tnEl){tnEl.textContent=S.timerSecs;tnEl.style.color=col;}
    if(S.timerSecs<=0)clearInterval(S.timerInterval);
  },1000);
}

// ── INIT ───────────────────────────────────────
render();
</script>
</body>
</html>
