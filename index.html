<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Nunito',sans-serif;background:#060A14;color:#F0EDE8;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0A0F1E}::-webkit-scrollbar-thumb{background:#1A2540;border-radius:2px}
input,button,select,textarea{font-family:'Nunito',sans-serif}

/* ── Layout desktop ── */
#app{min-height:100vh}
.sidebar{width:220px;background:#080D1A;border-right:1px solid #1A2540;display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:fixed;left:0;top:0;z-index:100}
.main-content{margin-left:220px;min-height:100vh;padding:28px}

/* ── Bottom nav mobile ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#080D1A;border-top:1px solid #1A2540;z-index:200;padding:0}
.bottom-nav-inner{display:flex;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;gap:3px;cursor:pointer;color:#4B5563;font-size:10px;font-weight:700;letter-spacing:.3px;border:none;background:none;transition:color .15s;min-height:56px}
.bnav-item.active{color:#1E6FFF}
.bnav-item span.ico{font-size:20px;line-height:1}

/* ── Mobile top header ── */
.mobile-header{display:none;background:#080D1A;border-bottom:1px solid #1A2540;padding:12px 16px;position:sticky;top:0;z-index:150;align-items:center;gap:10px}
.mobile-header .logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700}

/* ── Buttons ── */
.btn{padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #1A2540;background:#0D1224;color:#9CA3AF;transition:all .14s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn:hover:not(:disabled){background:#101830;color:#F0EDE8;transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1E6FFF;border-color:#1E6FFF;color:#060A14;font-weight:800}
.btn-primary:hover:not(:disabled){background:#1058CC;color:#060A14}
.btn-danger{background:#EF444418;border-color:#EF444440;color:#EF4444}
.btn-success{background:#22C55E18;border-color:#22C55E40;color:#22C55E}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-lg{padding:14px 36px;font-size:16px}
.btn-full{width:100%;justify-content:center}
.btn-google{background:#fff;border-color:#ddd;color:#333;font-weight:700}
.btn-google:hover{background:#f5f5f5}

/* ── Cards ── */
.card{background:#0A0F1E;border:1px solid #1A2540;border-radius:12px;padding:20px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:#4B5563;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:14px}

/* ── Form ── */
.field-label{font-size:11px;font-weight:700;color:#4B5563;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;display:block;margin-bottom:6px}
input[type=text],input[type=email],input[type=password],textarea,select{width:100%;background:#060A14;border:1.5px solid #1A2540;border-radius:8px;padding:12px 14px;color:#F0EDE8;font-size:14px;outline:none;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:#1E6FFF}
textarea{resize:none}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tag-admin{background:#EF444418;color:#EF4444;border:1px solid #EF444435}
.tag-teacher{background:#1E6FFF18;color:#1E6FFF;border:1px solid #1E6FFF35}
.tag-student{background:#10B98118;color:#10B981;border:1px solid #10B98135}
.tag-gold{background:#00D4FF18;color:#00D4FF;border:1px solid #00D4FF35}
.tag-sky{background:#00D4FF18;color:#00D4FF;border:1px solid #00D4FF35}
.tag-muted{background:#37415118;color:#6B7280;border:1px solid #37415135}
.tag-violet{background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA35}

/* ── Nav ── */
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:#64748B;border-left:3px solid transparent;transition:all .15s;font-weight:600}
.nav-item:hover{background:#0D1224;color:#F0EDE8}
.nav-item.active{color:#1E6FFF;border-left-color:#1E6FFF;background:rgba(30,111,255,0.08)}
.nav-section{padding:10px 16px 4px;font-size:10px;color:#374151;letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-top:8px}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:#0D1224;border:1px solid #1A2540;border-radius:10px;padding:16px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700}
.stat-lbl{font-size:11px;color:#4B5563;margin-top:3px}

/* ── Row/Col ── */
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:8px}
.sp{flex:1}

/* ── Misc ── */
.live-dot{width:7px;height:7px;border-radius:50%;background:#10B981;display:inline-block;animation:blink 1.8s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pbar{height:5px;background:#1A2540;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;background:#1E6FFF;border-radius:99px;transition:width .5s ease}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{opacity:0;transform:scale(.86)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .35s cubic-bezier(.2,.85,.3,1) both}
.pop{animation:pop .4s cubic-bezier(.2,.85,.3,1) both}
.spin-el{width:22px;height:22px;border:2px solid #1A2540;border-top-color:#1E6FFF;border-radius:50%;animation:spin .65s linear infinite;display:inline-block}

/* ── Toast ── */
#toast{position:fixed;top:16px;right:16px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;background:#101830;border:1px solid #1E2E50;color:#F0EDE8;box-shadow:0 8px 24px #00000080;display:none;max-width:300px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:#000000CC;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#0A0F1E;border:1px solid #1E2E50;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1A2540}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700}
.close-btn{background:none;border:none;color:#4B5563;font-size:22px;cursor:pointer;line-height:1;padding:4px 8px}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding-top:14px;border-top:1px solid #1A2540;margin-top:8px}

/* ── List items ── */
.list-item{background:#0D1224;border:1px solid #1A2540;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border .2s;cursor:pointer}
.list-item:hover{border-color:#1E6FFF40}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.pts-badge{background:#00D4FF18;border:1px solid #00D4FF30;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:#00D4FF;display:inline-flex;align-items:center;gap:5px}

/* ── Login screen ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,#1E6FFF10 0%,transparent 60%)}
.login-card{background:#0A0F1E;border:1px solid #1E2E50;border-radius:16px;padding:40px 36px;width:100%;max-width:420px;text-align:center}

/* ── Grid bg ── */
.grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(#1A254008 1px,transparent 1px),linear-gradient(90deg,#1A254008 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

/* ── Task rows ── */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0D1224;border-radius:9px;border:1px solid #1A2540;margin-bottom:7px}
.task-row:hover{border-color:#1E3345}

/* ══════════════════════════════════════
   RESPONSIVE MOBILE
══════════════════════════════════════ */
@media(max-width:700px){
  /* Ocultar sidebar, mostrar bottom nav y top header */
  .sidebar{display:none}
  .bottom-nav{display:block}
  .mobile-header{display:flex}

  /* Main content ocupa toda la pantalla */
  .main-content{
    margin-left:0;
    padding:16px 14px;
    padding-bottom:80px; /* espacio para bottom nav */
  }

  /* Grids en columna única */
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px}
  
  /* Dos columnas → una columna */
  div[style*="grid-template-columns:1fr 1fr"]{
    grid-template-columns:1fr !important;
  }
  
  /* Page header compacto */
  .page-header h1{font-size:20px !important}

  /* Cards más compactas */
  .card{padding:14px;margin-bottom:10px}

  /* Botones full width en mobile */
  .btn-lg{width:100%;justify-content:center}

  /* Login card */
  .login-card{padding:28px 20px}

  /* Modales full screen en mobile */
  .overlay{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-height:92vh;max-width:100%}

  /* Ocultar texto del nav cuando está en modo icon-only */
  .nav-label-desktop{display:none}

  /* Stat val más pequeño */
  .stat-val{font-size:24px}

  /* Task rows más compactos */
  .task-row{padding:8px 12px;gap:8px}

  /* Select en users list */
  select{font-size:13px}

  /* Fixes para grids inline */
  [style*="display:grid"]{
    grid-template-columns:1fr !important;
  }
  [style*="display: grid"]{
    grid-template-columns:1fr !important;
  }
}

@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-val{font-size:22px}
  .main-content{padding:12px 10px;padding-bottom:80px}
}
</style>
</head>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAawa9s6SUOW8oB5Fx1mZOAMu_1PlDcsg8",

var auth=firebase.auth();
var db=firebase.database();
var googleProvider=new firebase.auth.GoogleAuthProvider();

var ADMIN_EMAILS=["tyto.burdino.16@gmail.com"];
var YEARS=["1° Año","2° Año","3° Año","4° Año","5° Año","6° Año","7° Año"];
var SUBJECTS_BY_YEAR={
  "1° Año":["Matemática","Lengua y Literatura","Inglés","Ed. Física","Formación Ética","Tecnología","Taller de la Especialidad"],
  "2° Año":["Matemática","Lengua y Literatura","Inglés","Ed. Física","Historia","Geografía","Tecnología","Taller de la Especialidad"],
  "3° Año":["Matemática","Lengua y Literatura","Inglés","Ed. Física","Química","Física","Tecnología","Taller de la Especialidad"],
  "4° Año":["Matemática","Física","Química","Biología","Dibujo Técnico","Taller de la Especialidad","Ed. Física","Inglés","Lengua y Literatura","Historia","Geografía","Formación Ética","TIC"],
  "5° Año":["Análisis Matemático","Estática y Resistencia de Materiales","Materiales de Construcción","Arquitectura I","Dibujo Técnico","Química Aplicada","Trabajos Prácticos de la Especialidad","Ed. Física","Inglés","Lengua y Literatura","Formación Ética"],
  "6° Año":["Hormigón Armado","Construcciones Complementarias","Albañilería y Fundaciones","Legislación de la Construcción","Arquitectura II","Construcciones Metálicas y Madera","Trabajos Prácticos de la Especialidad","Proyecto I","Ed. Física"],
  "7° Año":["Cómputos y Presupuestos","Instalaciones Térmicas","Instalaciones Electromecánicas","Obra Sanitaria","Topografía y Obras Viales","Administración y Conducción de Obras","Relaciones Humanas","Proyecto II","Proyecto Final","Visita de Obras","STE Computación"]
};

var STATE={user:null,profile:null,tab:"dashboard",loading:true};

var AVC=["#1E6FFF","#10B981","#00D4FF","#A78BFA","#F43F5E","#38BDF8","#EC4899","#34D399"];
function avCol(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AVC.length;return AVC[h];}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();}
function avHtml(name,size,extra){
  size=size||36;var c=avCol(name);extra=extra||"";
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+c+'20;border:2px solid '+c+'60;color:'+c+';font-size:'+Math.round(size*.34)+'px;'+extra+'">'+ini(name)+'</div>';
}
function g(id){return document.getElementById(id);}
function h(id,html){var el=g(id);if(el)el.innerHTML=html;}
function toast(msg,type){
  var el=g("toast");type=type||"ok";
  el.textContent=(type==="ok"?"✅ ":type==="err"?"❌ ":"ℹ️ ")+msg;
  el.style.display="block";clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display="none";},3200);
}
function emailToKey(e){return e.replace(/\./g,"_").replace(/@/g,"__");}
function keyToEmail(k){return k.replace(/__/g,"@").replace(/_/g,".");}
function fmtDate(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtDateTime(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});}
function isMobile(){return window.innerWidth<=700;}

auth.onAuthStateChanged(function(user){
  STATE.loading=false;
  if(!user){STATE.user=null;STATE.profile=null;render();return;}
  STATE.user=user;
  var key=emailToKey(user.email);
  db.ref("users/"+key).once("value").then(function(snap){
    if(snap.exists()){
      STATE.profile=snap.val();
      db.ref("users/"+key).update({lastLogin:Date.now(),photoURL:user.photoURL||""});
    } else {
      var role=ADMIN_EMAILS.indexOf(user.email)>=0?"admin":"student";
      var profile={email:user.email,name:user.displayName||user.email,role:role,photoURL:user.photoURL||"",createdAt:Date.now(),lastLogin:Date.now(),points:0,streak:0};
      STATE.profile=profile;
      db.ref("users/"+key).set(profile);
    }
    STATE.tab="dashboard";
    render();
  });
});

function loginGoogle(){
  auth.signInWithPopup(googleProvider).catch(function(e){toast("Error al iniciar sesión: "+e.message,"err");});
}
function logout(){
  auth.signOut().then(function(){STATE.user=null;STATE.profile=null;render();});
}

// ── Sidebar builder (desktop) ──
function buildSidebar(tabs,roleTag){
  var navHtml=tabs.map(function(t){
    return '<div class="nav-item'+(STATE.tab===t.id?" active":"")+'" onclick="setTab(\''+t.id+'\')">'+
      '<span style="font-size:16px">'+t.icon+'</span><span class="nav-label">'+t.label+'</span></div>';
  }).join("");
  return '<div class="sidebar">'+
    '<div style="padding:16px 16px 12px;border-bottom:1px solid #1A2540">'+
      '<div style="font-family:\'Rajdhani\',sans-serif;font-size:18px;font-weight:700">TECNI<span style="color:#1E6FFF">QUIZ</span></div>'+
      '<div style="font-size:9px;color:#374151;letter-spacing:1.5px;font-family:\'JetBrains Mono\',monospace;margin-top:2px">EET N°23</div>'+
    '</div>'+
    '<div class="nav-section">MENÚ</div>'+
    navHtml+
    '<div style="margin-top:auto;border-top:1px solid #1A2540;padding:12px 16px">'+
      '<div class="row" style="gap:10px">'+
        avHtml(STATE.profile.name,32)+
        '<div style="min-width:0;flex:1">'+
          '<div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+STATE.profile.name+'</div>'+
          '<div>'+roleTag+'</div>'+
        '</div>'+
        '<button onclick="logout()" style="background:none;border:none;color:#374151;cursor:pointer;font-size:18px" title="Salir">⏏</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── Bottom nav builder (mobile) ──
function buildBottomNav(tabs){
  return '<nav class="bottom-nav"><div class="bottom-nav-inner">'+
    tabs.map(function(t){
      return '<button class="bnav-item'+(STATE.tab===t.id?" active":"")+'" onclick="setTab(\''+t.id+'\')">'+
        '<span class="ico">'+t.icon+'</span>'+
        '<span>'+t.label+'</span>'+
      '</button>';
    }).join("")+
    '<button class="bnav-item" onclick="logout()" style="max-width:52px">'+
      '<span class="ico">⏏</span>'+
      '<span>Salir</span>'+
    '</button>'+
  '</div></nav>';
}

// ── Mobile top header ──
function buildMobileHeader(subtitle){
  return '<header class="mobile-header">'+
    '<div style="font-family:\'Rajdhani\',sans-serif;font-size:20px;font-weight:700">TECNI<span style="color:#1E6FFF">QUIZ</span></div>'+
    '<div style="font-size:10px;color:#4B5563;flex:1">'+subtitle+'</div>'+
    avHtml(STATE.profile.name,32)+
  '</header>';
}

function render(){
  var app=g("app");
  if(STATE.loading){
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div class="spin-el"></div></div>';
    return;
  }
  if(!STATE.user||!STATE.profile){app.innerHTML=renderLogin();setTimeout(startLoginCanvas,50);return;}
  var role=STATE.profile.role;
  if(role==="admin") renderAdmin();
  else if(role==="teacher") renderTeacher();
  else renderStudent();
}

// ── LOGIN ──
function renderLogin(){
  return '<div id="tq-login" style="position:fixed;inset:0;background:#060810;overflow:hidden;z-index:999">'+
    '<canvas id="tq-cv" style="position:absolute;inset:0;width:100%;height:100%"></canvas>'+
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px">'+
      '<div style="background:rgba(8,10,15,0.75);border:1px solid rgba(30,111,255,0.2);border-radius:18px;padding:36px 40px;text-align:center;max-width:400px;width:100%;position:relative">'+
        '<div style="width:64px;height:64px;margin:0 auto 14px;border:1.5px solid rgba(30,111,255,0.4);border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(30,111,255,0.08)">'+
          '<svg width="36" height="36" viewBox="0 0 36 36"><rect width="36" height="36" rx="8" fill="url(#tqg)"/><defs><linearGradient id="tqg" x1="0" y1="0" x2="36" y2="36"><stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#0EA5FF"/></linearGradient></defs><text x="8" y="25" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="white">t</text><text x="19" y="25" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#00D4FF">q</text></svg>'+
        '</div>'+
        '<div style="font-family:\'Rajdhani\',sans-serif;font-size:42px;font-weight:700;letter-spacing:-1px;line-height:1;color:#F0EDE8">TECNI<span style="color:#1E6FFF">QUIZ</span></div>'+
        '<div style="font-size:10px;color:#1E6FFF;letter-spacing:3px;margin-top:6px;font-family:\'JetBrains Mono\',monospace;opacity:.85">sabés más de lo que creés</div>'+

function startLoginCanvas(){
  var cv=document.getElementById('tq-cv');
  if(!cv) return;
  var ctx=cv.getContext('2d');
  var wrap=document.getElementById('tq-login');
  var W,H,T=0,mouse={x:-999,y:-999};
  var particles=[];
  var energyLines=[];

  var SYMS=[
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(s*.3);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;ctx.strokeRect(-s,-s*1.3,s*2,s*2.6);ctx.beginPath();ctx.moveTo(0,-s*1.3);ctx.lineTo(0,s*1.3);ctx.stroke();ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(s,0);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(T*.007);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;var t=8,r1=s,r2=s*1.5;ctx.beginPath();for(var i=0;i<t*2;i++){var an=(i/t)*Math.PI;var r=i%2?r2:r1;i===0?ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r):ctx.lineTo(Math.cos(an)*r,Math.sin(an)*r);}ctx.closePath();ctx.stroke();ctx.beginPath();ctx.arc(0,0,s*.45,0,Math.PI*2);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(s*.5);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,-s*1.3);ctx.lineTo(s*1.1,s*.8);ctx.lineTo(-s*1.1,s*.8);ctx.closePath();ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=.8;for(var i=0;i<3;i++){ctx.save();ctx.rotate(i/3*Math.PI+T*.009);ctx.beginPath();ctx.ellipse(0,0,s*1.3,s*.45,0,0,Math.PI*2);ctx.stroke();ctx.restore();}ctx.beginPath();ctx.arc(0,0,s*.3,0,Math.PI*2);ctx.fillStyle='rgba(30,111,255,'+a+')';ctx.fill();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/4);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;ctx.strokeRect(-s*1.4,-s*.4,s*2.8,s*.8);for(var i=-3;i<=3;i++){var h=i%2===0?s*.6:s*.35;ctx.beginPath();ctx.moveTo(i*s*.4,-h/2);ctx.lineTo(i*s*.4,h/2);ctx.stroke();}ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,-s*.2,s*.8,Math.PI*.25,Math.PI*.75,true);ctx.lineTo(-s*.38,s*.65);ctx.lineTo(s*.38,s*.65);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.28,s*.78);ctx.lineTo(s*.28,s*.78);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.18,s*.95);ctx.lineTo(s*.18,s*.95);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1.1;ctx.beginPath();ctx.moveTo(-s*1.1,-s*.7);ctx.lineTo(s*1.1,-s*.7);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.4,-s*.7);ctx.lineTo(-s*.4,s*.9);ctx.stroke();ctx.beginPath();ctx.moveTo(s*.4,-s*.7);ctx.bezierCurveTo(s*.4,s*.2,s*1.0,s*.5,s*.8,s*.9);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(-Math.PI/6);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-s*1.1,s*.6);ctx.lineTo(0,-s*1.0);ctx.lineTo(s*1.1,s*.6);ctx.stroke();ctx.beginPath();ctx.arc(0,s*.6,s*.5,Math.PI,0);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=.9;ctx.strokeRect(-s*1.1,-s*.8,s*2.2,s*1.6);ctx.beginPath();ctx.moveTo(-s*.6,-s*.3);ctx.lineTo(s*.6,-s*.3);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.4,s*.1);ctx.lineTo(s*.4,s*.1);ctx.stroke();ctx.beginPath();ctx.arc(0,-s*.8,s*.15,0,Math.PI*2);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;var pts=5,outer=s*1.2,inner=s*.5;ctx.beginPath();for(var i=0;i<pts*2;i++){var an=i*Math.PI/pts-Math.PI/2;var r=i%2===0?outer:inner;i===0?ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r):ctx.lineTo(Math.cos(an)*r,Math.sin(an)*r);}ctx.closePath();ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-s,-s);ctx.lineTo(-s,s);ctx.lineTo(s,s);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(T*.005);ctx.strokeStyle='rgba(30,111,255,'+a+')';ctx.lineWidth=.9;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(s,0);ctx.moveTo(0,-s);ctx.lineTo(0,s);ctx.stroke();ctx.restore();},
  ];

  function mkP(){
    return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.32,vy:(Math.random()-.5)*.32,s:Math.random()*6+3,type:Math.floor(Math.random()*SYMS.length),a:Math.random()*.22+.05,ph:Math.random()*Math.PI*2};
  }

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    particles=[];
    // Densidad: 1 símbolo cada 5500px² — más denso que antes (9000)
    var n=Math.floor((W*H)/5500);
    n=Math.min(n,120); // cap de seguridad
    for(var i=0;i<n;i++) particles.push(mkP());
  }

  function spawnLine(){
    if(energyLines.length>15) return;
    energyLines.push({x:Math.random()<.5?0:W,y:Math.random()*H,vx:(Math.random()<.5?1:-1)*(Math.random()*.7+.3),vy:(Math.random()-.5)*.5,hist:[],a:Math.random()*.35+.1,maxLen:Math.random()*90+40,life:1});
  }

  function frame(){
    T++;
    ctx.clearRect(0,0,W,H);
    var grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
    grad.addColorStop(0,'#060A14');grad.addColorStop(1,'#04080F');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle='rgba(30,111,255,0.04)';ctx.lineWidth=.5;
    for(var x=0;x<W;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(var y=0;y<H;y+=56){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Energy lines
    if(T%35===0) spawnLine();
    energyLines=energyLines.filter(function(l){return l.life>.01;});
    energyLines.forEach(function(l){
      l.hist.push({x:l.x,y:l.y});
      if(l.hist.length>l.maxLen) l.hist.shift();
      l.x+=l.vx;l.y+=l.vy;l.life-=.004;
      if(l.x<-20||l.x>W+20||l.y<-20||l.y>H+20) l.life=0;
      if(l.hist.length>2){
        for(var i=1;i<l.hist.length;i++){
          ctx.beginPath();ctx.moveTo(l.hist[i-1].x,l.hist[i-1].y);ctx.lineTo(l.hist[i].x,l.hist[i].y);
          ctx.strokeStyle='rgba(30,111,255,'+(i/l.hist.length*l.a*l.life)+')';ctx.lineWidth=.8;ctx.stroke();
        }
      }
    });

    // Particles
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-60)p.x=W+60;if(p.x>W+60)p.x=-60;
      if(p.y<-60)p.y=H+60;if(p.y>H+60)p.y=-60;
      var dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
      var glow=d<150?((150-d)/150):0;
      var a=Math.min(p.a+glow*.65+Math.sin(T*.018+p.ph)*.03,.92);
      SYMS[p.type](p.x,p.y,p.s,a);
      // Conexiones entre partículas cercanas
      particles.forEach(function(q){
        if(q===p) return;
        var ddx=p.x-q.x,ddy=p.y-q.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<85){
          var la=(1-dd/85)*0.07+(glow*.12);
          ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
          ctx.strokeStyle='rgba(30,111,255,'+la+')';ctx.lineWidth=.5;ctx.stroke();
        }
      });
    });

    // Mouse aurora
    if(mouse.x>0&&mouse.x<W){
      var mg=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,180);
      mg.addColorStop(0,'rgba(30,111,255,0.08)');mg.addColorStop(1,'rgba(30,111,255,0)');
      ctx.fillStyle=mg;ctx.fillRect(0,0,W,H);
    }

    // Orbs
    for(var o=0;o<3;o++){
      var ox=W*.2+Math.sin(T*.005+o*2.1)*W*.3+o*W*.25;
      var oy=H*.3+Math.cos(T*.007+o*1.7)*H*.2;
      var og=ctx.createRadialGradient(ox,oy,0,ox,oy,90+o*20);
      og.addColorStop(0,'rgba(30,111,255,0.04)');og.addColorStop(1,'rgba(30,111,255,0)');
      ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
    }

    requestAnimationFrame(frame);
  }

  wrap.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  wrap.addEventListener('mouseleave',function(){mouse.x=-999;mouse.y=-999;});
  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(frame);
}

function loadAssignSubjects(key){
  db.ref("users/"+key+"/subjects").once("value").then(function(snap){
    var assigned=snap.val()||{};
    var el=g("assign-subjects-body");if(!el)return;
    var html='<div style="display:flex;flex-direction:column;gap:12px">';
    YEARS.forEach(function(yr){
      html+='<div><div style="font-size:11px;color:#1E6FFF;font-family:\'JetBrains Mono\',monospace;letter-spacing:1px;margin-bottom:7px;text-transform:uppercase">'+yr+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:7px">';
      SUBJECTS_BY_YEAR[yr].forEach(function(subj){
        var sid=yr.replace(/[°\s]/g,"_")+"_"+subj.replace(/[^\w]/g,"_");
        var checked=assigned[sid]?true:false;
        html+='<label style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid '+(checked?"#1E6FFF50":"#1A2540")+';background:'+(checked?"#1E6FFF12":"#0D1224")+';cursor:pointer;font-size:12px">'+
          '<input type="checkbox" '+(checked?"checked":"")+' style="accent-color:#1E6FFF" onchange="toggleSubject(\''+key+'\',\''+sid+'\',\''+yr+'\',\''+subj.replace(/'/g,"\\'")+'\',this.checked)">'+
          subj+'</label>';
      });
      html+='</div></div>';
    });
    html+='</div>';
    el.innerHTML=html;
  });
}

function toggleSubject(key,sid,year,subj,checked){
  if(checked){
    db.ref("users/"+key+"/subjects/"+sid).set({year:year,subject:subj}).then(function(){toast("Materia asignada");});
  } else {
    db.ref("users/"+key+"/subjects/"+sid).remove().then(function(){toast("Materia removida","info");});
  }
}

function loadTeacherTasks(){
  var key=emailToKey(STATE.profile.email);
  db.ref("tasks").orderByChild("teacherKey").equalTo(key).once("value").then(function(snap){
    var tasks=Object.entries(snap.val()||{}).map(function(e){return Object.assign({id:e[0]},e[1]);});
    tasks.sort(function(a,b){return b.createdAt-a.createdAt;});
    var el=g("tasks-list");if(!el)return;
    if(tasks.length===0){
      el.innerHTML='<div class="card" style="text-align:center;padding:40px"><p style="color:#374151;margin-bottom:16px">No creaste ninguna tarea todavía.</p><button class="btn btn-primary" onclick="openNewTask()">＋ Crear primera tarea</button></div>';
      return;
    }
    var now=Date.now();
    el.innerHTML=tasks.map(function(t){
      var overdue=t.dueDate&&t.dueDate<now;
      var sc=overdue?"#EF4444":t.status==="active"?"#10B981":"#374151";
      var sl=overdue?"Vencida":t.status==="active"?"Activa":"Borrador";
      return '<div class="card">'+
        '<div class="row" style="margin-bottom:10px;flex-wrap:wrap;gap:6px">'+
          '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700">'+t.title+'</div>'+
          '<div style="font-size:12px;color:#4B5563">'+t.year+' · '+t.subject+'</div></div>'+
          '<span style="font-size:11px;background:'+sc+'18;color:'+sc+';border:1px solid '+sc+'30;padding:3px 10px;border-radius:5px;font-weight:700">'+sl+'</span>'+
        '</div>'+
        (t.dueDate?'<div style="font-size:12px;color:#4B5563;margin-bottom:10px">📅 Vence: '+fmtDate(t.dueDate)+'</div>':'')+
        '<div class="row" style="gap:8px">'+
          '<button class="btn btn-sm" onclick="viewTaskMonitor(\''+t.id+'\')">📊 Monitor</button>'+
          '<button class="btn btn-sm btn-danger" onclick="deleteTask(\''+t.id+'\')">✕</button>'+
        '</div>'+
      '</div>';
    }).join("");
  });
}

function openNewTask(){
  var key=emailToKey(STATE.profile.email);
  db.ref("users/"+key+"/subjects").once("value").then(function(snap){
    var subjects=Object.values(snap.val()||{});
    var subjOpts=subjects.length>0
      ?subjects.map(function(s){return '<option value="'+s.year+'|'+s.subject+'">'+s.year+' — '+s.subject+'</option>';}).join("")
      :'<option value="">Sin materias asignadas</option>';
    h("task-modal-root",'<div class="overlay" onclick="closeTModal()">'+
      '<div class="modal" onclick="event.stopPropagation()">'+
      '<div class="modal-header"><span class="modal-title">Nueva tarea</span><button class="close-btn" onclick="closeTModal()">×</button></div>'+

        '<div><label class="field-label">Grupo / Materia</label><select id="task-group">'+subjOpts+'</select></div>'+
        '<div><label class="field-label">Fecha de entrega</label><input type="datetime-local" id="task-due" style="color:#F0EDE8"></div>'+
        '<div class="modal-footer">'+

        '</div>'+
      '</div></div></div></div>');

function closeTModal(){h("task-modal-root","");}

function saveTask(){
  var title=g("task-title").value.trim();
  var desc=g("task-desc").value.trim();
  var group=g("task-group").value;
  var due=g("task-due").value;
  if(!title){toast("Ingresá un título","err");return;}
  if(!group||group.indexOf("|")<0){toast("Seleccioná un grupo","err");return;}
  var parts=group.split("|");
  var key=emailToKey(STATE.profile.email);
  db.ref("tasks").push({
    title:title,description:desc,year:parts[0],subject:parts[1],
    teacherKey:key,teacherName:STATE.profile.name,
    dueDate:due?new Date(due).getTime():null,
    createdAt:Date.now(),status:"active",submissions:{}
  }).then(function(){
    closeTModal();toast("Tarea creada");loadTeacherTasks();
  });
}

function deleteTask(id){
  if(!confirm("¿Eliminar esta tarea?"))return;
  db.ref("tasks/"+id).remove().then(function(){toast("Tarea eliminada","info");loadTeacherTasks();});
}

function viewTaskMonitor(taskId){
  db.ref("tasks/"+taskId).once("value").then(function(snap){
    var task=snap.val();if(!task)return;
    db.ref("users").once("value").then(function(usnap){
      var students=Object.values(usnap.val()||{}).filter(function(u){return u.role==="student"&&u.year===task.year;});
      var subs=task.submissions||{};
      var delivered=students.filter(function(s){return subs[emailToKey(s.email)];}).length;
      h("modal-root",'<div class="overlay" onclick="closeModal()">'+
        '<div class="modal" onclick="event.stopPropagation()">'+
        '<div class="modal-header"><span class="modal-title">Monitor: '+task.title+'</span><button class="close-btn" onclick="closeModal()">×</button></div>'+
        '<div class="modal-body">'+
        '<div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:16px">'+
          '<div class="stat-card"><div class="stat-val" style="color:#10B981">'+delivered+'</div><div class="stat-lbl">Entregaron</div></div>'+
          '<div class="stat-card"><div class="stat-val" style="color:#EF4444">'+(students.length-delivered)+'</div><div class="stat-lbl">Pendiente</div></div>'+
          '<div class="stat-card"><div class="stat-val" style="color:#1E6FFF">'+students.length+'</div><div class="stat-lbl">Total</div></div>'+
        '</div>'+
        students.map(function(s){
          var sub=subs[emailToKey(s.email)];
          return '<div class="task-row">'+
            avHtml(s.name,30)+
            '<span style="flex:1;font-size:13px;font-weight:600">'+s.name+'</span>'+
            (sub?'<span style="font-size:11px;background:#10B98120;color:#10B981;padding:2px 8px;border-radius:6px">✓ Entregó</span>':
              '<span style="font-size:11px;background:#EF444420;color:#EF4444;padding:2px 8px;border-radius:6px">Pendiente</span>')+
          '</div>';
        }).join("")+
        (students.length===0?'<p style="color:#374151;text-align:center;padding:20px">No hay alumnos en este año.</p>':'')+
        '<div class="modal-footer"><button class="btn" onclick="closeModal()">Cerrar</button></div>'+
        '</div></div></div>');
    });
  });
}

  var key=emailToKey(STATE.profile.email);
  db.ref("tasks").orderByChild("year").equalTo(STATE.profile.year).once("value").then(function(snap){
    var tasks=Object.entries(snap.val()||{}).map(function(e){return Object.assign({id:e[0]},e[1]);});
    tasks.sort(function(a,b){return(b.dueDate||0)-(a.dueDate||0);});
    var el=g("student-tasks-list");if(!el)return;
    if(tasks.length===0){
      el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#374151">No hay tareas para tu curso todavía.</div>';return;
    }
    var now=Date.now();
    el.innerHTML=tasks.map(function(t){
      var submitted=t.submissions&&t.submissions[key];
      var isOverdue=t.dueDate&&t.dueDate<now&&!submitted;
      var sc=submitted?"#10B981":isOverdue?"#EF4444":"#00D4FF";
      var sl=submitted?"✅ Entregado":isOverdue?"❌ Vencida":"⏳ Pendiente";
      return '<div class="card">'+
        '<div class="row" style="margin-bottom:8px;flex-wrap:wrap;gap:6px">'+
          '<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700">'+t.title+'</div>'+
          '<div style="font-size:12px;color:#4B5563">'+t.subject+' · '+t.teacherName+'</div></div>'+
          '<span style="font-size:11px;background:'+sc+'18;color:'+sc+';border:1px solid '+sc+'30;padding:3px 10px;border-radius:5px;font-weight:700">'+sl+'</span>'+
        '</div>'+
        (t.description?'<p style="font-size:13px;color:#9CA3AF;margin-bottom:10px">'+t.description+'</p>':'')+
        '<div class="row" style="flex-wrap:wrap;gap:8px">'+
          (t.dueDate?'<span style="font-size:12px;color:#4B5563">📅 '+fmtDateTime(t.dueDate)+'</span>':'')+
          '<span class="sp"></span>'+
          (!submitted?'<button class="btn btn-primary btn-sm" onclick="submitTask(\''+t.id+'\')">✓ Entregar</button>':'<span style="font-size:12px;color:#10B981">Entregado '+fmtDateTime(t.submissions[key].submittedAt)+'</span>')+
        '</div>'+
      '</div>';
    }).join("");
  });
}

function submitTask(taskId){
  var key=emailToKey(STATE.profile.email);
  var now=Date.now();
  db.ref("tasks/"+taskId).once("value").then(function(snap){
    var task=snap.val();if(!task)return;
    var onTime=!task.dueDate||task.dueDate>=now;
    var pts=onTime?300:100;
    db.ref("tasks/"+taskId+"/submissions/"+key).set({submittedAt:now,onTime:onTime,studentName:STATE.profile.name});
    var newPts=(STATE.profile.points||0)+pts;
    STATE.profile.points=newPts;
    db.ref("users/"+key).update({points:newPts});
    toast("¡Entregada! +"+(onTime?"300":"100")+" pts "+(onTime?"🎉":""));
    loadStudentTasks();
  });
}

function studentQuiz(){
  return '<div class="row page-header" style="margin-bottom:18px"><h1 style="font-family:\'Rajdhani\',sans-serif;font-size:22px;font-weight:700">Quiz</h1></div>'+
    '<div class="card" style="text-align:center;padding:40px">'+
    '<div style="font-size:48px;margin-bottom:16px">⚡</div>'+
    '<p style="font-size:15px;color:#9CA3AF;margin-bottom:8px">Ingresá el código que te da tu docente para unirte al quiz.</p>'+
    '<div style="display:flex;flex-direction:column;gap:12px;max-width:280px;margin:0 auto">'+
    '<button class="btn btn-primary btn-full btn-lg" onclick="toast(\'Próximamente: ingresar con código\',\'info\')">Ingresar con código</button>'+
    '<button class="btn btn-full" onclick="toast(\'Próximamente: modo práctica\',\'info\')">Practicar solo</button>'+
    '</div></div>';
}

function studentRanking(){
  return '<div class="row page-header" style="margin-bottom:18px;flex-wrap:wrap;gap:8px">'+
    '<h1 style="font-family:\'Rajdhani\',sans-serif;font-size:22px;font-weight:700">Ranking</h1>'+
    '<span class="sp"></span>'+
    '<span class="tag tag-gold">'+new Date().toLocaleString("es-AR",{month:"long",year:"numeric"}).toUpperCase()+'</span>'+
    '</div>'+
    '<div id="ranking-list"><div style="text-align:center;padding:32px"><div class="spin-el" style="margin:0 auto"></div></div></div>';
}

function studentProfile(){
  var p=STATE.profile;
  return '<div class="row page-header" style="margin-bottom:18px"><h1 style="font-family:\'Rajdhani\',sans-serif;font-size:22px;font-weight:700">Mi Perfil</h1></div>'+
    '<div class="card" style="text-align:center;padding:24px">'+
      avHtml(p.name,64,"margin:0 auto 12px")+
      '<div style="font-size:18px;font-weight:700;margin-bottom:4px">'+p.name+'</div>'+
      '<div style="font-size:13px;color:#4B5563;margin-bottom:10px">'+p.email+'</div>'+
      '<span class="tag tag-student">ALUMNO</span>'+
    '</div>'+
    '<div class="stat-grid" style="grid-template-columns:1fr 1fr">'+
      '<div class="stat-card"><div class="stat-val" style="color:#00D4FF">'+(p.points||0).toLocaleString()+'</div><div class="stat-lbl">Puntos</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:#A78BFA">'+(p.streak||0)+'</div><div class="stat-lbl">Racha días</div></div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-title">Información</div>'+
      '<div style="display:flex;flex-direction:column;gap:10px">'+
        '<div class="row"><span style="color:#4B5563;font-size:13px;flex:1">Año</span><span style="font-size:13px;font-weight:700">'+p.year+'</span></div>'+
        '<div class="row"><span style="color:#4B5563;font-size:13px;flex:1">Miembro desde</span><span style="font-size:13px">'+fmtDate(p.createdAt)+'</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-title">Cambiar año</div>'+
      '<div style="display:flex;gap:7px;flex-wrap:wrap">'+
      YEARS.map(function(yr){
        var isActive=yr===p.year;
        return '<button onclick="selectYear(\''+yr+'\')" style="padding:8px 12px;border-radius:7px;border:1px solid '+(isActive?"#1E6FFF":"#1A2540")+';background:'+(isActive?"#1E6FFF18":"#0D1224")+';color:'+(isActive?"#1E6FFF":"#6B7280")+';font-size:12px;font-weight:700;cursor:pointer">'+yr+'</button>';
      }).join("")+
      '</div>'+
    '</div>';
}

render();
</script>
