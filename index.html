<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Nunito',sans-serif;background:#080A0F;color:#F0EDE8;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0F1117}::-webkit-scrollbar-thumb{background:#1E2333;border-radius:2px}
input,button,select,textarea{font-family:'Nunito',sans-serif}

/* ── Layout ── */
#app{min-height:100vh}
.sidebar{width:220px;background:#0C0E14;border-right:1px solid #1E2333;display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:fixed;left:0;top:0;z-index:100}
.main-content{margin-left:220px;min-height:100vh;padding:28px}

/* ── Buttons ── */
.btn{padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #1E2333;background:#11141C;color:#9CA3AF;transition:all .14s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.btn:hover:not(:disabled){background:#181C27;color:#F0EDE8;transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#F97316;border-color:#F97316;color:#080A0F;font-weight:800}
.btn-primary:hover:not(:disabled){background:#EA6C10;color:#080A0F}
.btn-danger{background:#EF444418;border-color:#EF444440;color:#EF4444}
.btn-success{background:#22C55E18;border-color:#22C55E40;color:#22C55E}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-lg{padding:14px 36px;font-size:16px}
.btn-full{width:100%;justify-content:center}
.btn-google{background:#fff;border-color:#ddd;color:#333;font-weight:700}
.btn-google:hover{background:#f5f5f5;transform:translateY(-1px)}

/* ── Cards ── */
.card{background:#0F1117;border:1px solid #1E2333;border-radius:12px;padding:20px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:#4B5563;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:14px}

/* ── Form ── */
.field-label{font-size:11px;font-weight:700;color:#4B5563;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;display:block;margin-bottom:6px}
input[type=text],input[type=email],input[type=password],textarea,select{width:100%;background:#080A0F;border:1.5px solid #1E2333;border-radius:8px;padding:11px 14px;color:#F0EDE8;font-size:14px;outline:none;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:#F97316}
textarea{resize:none}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tag-admin{background:#EF444418;color:#EF4444;border:1px solid #EF444435}
.tag-teacher{background:#F9731618;color:#F97316;border:1px solid #F9731635}
.tag-student{background:#10B98118;color:#10B981;border:1px solid #10B98135}
.tag-gold{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B35}
.tag-sky{background:#38BDF818;color:#38BDF8;border:1px solid #38BDF835}
.tag-muted{background:#37415118;color:#6B7280;border:1px solid #37415135}
.tag-violet{background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA35}

/* ── Nav ── */
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:#64748B;border-left:3px solid transparent;transition:all .15s;font-weight:600}
.nav-item:hover{background:#11141C;color:#F0EDE8}
.nav-item.active{color:#F97316;border-left-color:#F97316;background:#F9731610}
.nav-section{padding:10px 16px 4px;font-size:10px;color:#374151;letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-top:8px}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:#11141C;border:1px solid #1E2333;border-radius:10px;padding:16px;text-align:center}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700}
.stat-lbl{font-size:11px;color:#4B5563;margin-top:3px}

/* ── Row/Col ── */
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:8px}
.sp{flex:1}

/* ── Misc ── */
.live-dot{width:7px;height:7px;border-radius:50%;background:#10B981;display:inline-block;animation:blink 1.8s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pbar{height:5px;background:#1E2333;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;background:#F97316;border-radius:99px;transition:width .5s ease}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{opacity:0;transform:scale(.86)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .35s cubic-bezier(.2,.85,.3,1) both}
.pop{animation:pop .4s cubic-bezier(.2,.85,.3,1) both}
.spin-el{width:22px;height:22px;border:2px solid #1E2333;border-top-color:#F97316;border-radius:50%;animation:spin .65s linear infinite;display:inline-block}

/* ── Toast ── */
#toast{position:fixed;top:16px;right:16px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;background:#181C27;border:1px solid #2C3348;color:#F0EDE8;box-shadow:0 8px 24px #00000080;display:none;max-width:340px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:#000000CC;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#0F1117;border:1px solid #2C3348;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1E2333}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700}
.close-btn{background:none;border:none;color:#4B5563;font-size:22px;cursor:pointer;line-height:1}
.modal-body{padding:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding-top:14px;border-top:1px solid #1E2333;margin-top:8px}

/* ── List items ── */
.list-item{background:#11141C;border:1px solid #1E2333;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border .2s;cursor:pointer}
.list-item:hover{border-color:#F9731640}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}

/* ── Progress ring ── */
.pts-badge{background:#F59E0B18;border:1px solid #F59E0B30;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:#F59E0B;display:inline-flex;align-items:center;gap:5px}

/* ── Login screen ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,#F9731610 0%,transparent 60%)}
.login-card{background:#0F1117;border:1px solid #2C3348;border-radius:16px;padding:40px 36px;width:100%;max-width:420px;text-align:center}

/* ── Responsive ── */
@media(max-width:700px){
  .sidebar{width:56px}
  .sidebar .nav-label,.sidebar .nav-section,.sidebar .sb-user,.sidebar .sb-logo-sub{display:none}
  .nav-item{justify-content:center;padding:12px}
  .main-content{margin-left:56px;padding:16px}
}

/* ── Grid bg ── */
.grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(#1E233308 1px,transparent 1px),linear-gradient(90deg,#1E233308 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

/* ── Task status ── */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#11141C;border-radius:9px;border:1px solid #1E2333;margin-bottom:7px}
.task-row:hover{border-color:#1E3345}
</style>
</head>

  "6° Año":["Hormigón Armado","Construcciones Complementarias","Albañilería y Fundaciones","Legislación de la Construcción","Arquitectura II","Construcciones Metálicas y Madera","Trabajos Prácticos de la Especialidad","Proyecto I","Ed. Física"],
  "7° Año":["Cómputos y Presupuestos","Instalaciones Térmicas","Instalaciones Electromecánicas","Obra Sanitaria","Topografía y Obras Viales","Administración y Conducción de Obras","Relaciones Humanas","Proyecto II","Proyecto Final","Visita de Obras","STE Computación"]
};

// ── App state ──────────────────────────────────────
var STATE={
  user:null,         // Firebase user
  profile:null,      // {role, name, email, ...}
  tab:"dashboard",   // current tab
  loading:true,
};

// ── Helpers ────────────────────────────────────────
var AVC=["#F97316","#10B981","#F59E0B","#A78BFA","#F43F5E","#38BDF8","#EC4899","#34D399"];
function avCol(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AVC.length;return AVC[h];}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();}
function avHtml(name,size,extra){
  size=size||36;var c=avCol(name);extra=extra||"";
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+c+'20;border:2px solid '+c+'60;color:'+c+';font-size:'+Math.round(size*.34)+'px;'+extra+'">'+ini(name)+'</div>';
}
function g(id){return document.getElementById(id);}
function h(id,html){var el=g(id);if(el)el.innerHTML=html;}
function toast(msg,type){
  var el=g("toast");type=type||"ok";
  el.textContent=(type==="ok"?"✅ ":type==="err"?"❌ ":"ℹ️ ")+msg;
  el.style.display="block";clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display="none";},3200);
}
function emailToKey(e){return e.replace(/\./g,"_").replace(/@/g,"__");}
function keyToEmail(k){return k.replace(/__/g,"@").replace(/_/g,".");}
function fmtDate(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtDateTime(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});}

// ── Auth listener ──────────────────────────────────
auth.onAuthStateChanged(function(user){
  STATE.loading=false;
  if(!user){STATE.user=null;STATE.profile=null;render();return;}
  STATE.user=user;
  // Load or create profile
  var key=emailToKey(user.email);
  db.ref("users/"+key).once("value").then(function(snap){
    if(snap.exists()){
      STATE.profile=snap.val();
      // Update last login
      db.ref("users/"+key).update({lastLogin:Date.now(),photoURL:user.photoURL||""});
    } else {
      // Auto-assign role
      var role=ADMIN_EMAILS.indexOf(user.email)>=0?"admin":"student";
      var profile={
        email:user.email,name:user.displayName||user.email,
        role:role,photoURL:user.photoURL||"",
        createdAt:Date.now(),lastLogin:Date.now(),
        points:0,streak:0
      };
      STATE.profile=profile;
      db.ref("users/"+key).set(profile);
    }
    STATE.tab="dashboard";
    render();
  });
});

// ── Login ──────────────────────────────────────────
function loginGoogle(){
  auth.signInWithPopup(googleProvider).catch(function(e){
    toast("Error al iniciar sesión: "+e.message,"err");
  });
}
function logout(){
  auth.signOut().then(function(){STATE.user=null;STATE.profile=null;render();});
}

// ── RENDER PRINCIPAL ───────────────────────────────
function render(){
  var app=g("app");
  if(STATE.loading){
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div class="spin-el"></div></div>';
    return;
  }
  if(!STATE.user||!STATE.profile){
    app.innerHTML=renderLogin();
    return;
  }
  var role=STATE.profile.role;
  if(role==="admin") renderAdmin();
  else if(role==="teacher") renderTeacher();
  else renderStudent();
}

// Admin Dashboard
function adminDashboard(){
  // Load stats async
  setTimeout(function(){
    db.ref("users").once("value").then(function(snap){
      var users=Object.values(snap.val()||{});
      var teachers=users.filter(function(u){return u.role==="teacher";}).length;
      var students=users.filter(function(u){return u.role==="student";}).length;

      if(statsEl) statsEl.innerHTML=

        '<div class="stat-card"><div class="stat-val" style="color:#10B981">'+students+'</div><div class="stat-lbl">Alumnos</div></div>'+
        '<div class="stat-card"><div class="stat-val" style="color:#F97316">'+users.length+'</div><div class="stat-lbl">Total usuarios</div></div>'+
        '<div class="stat-card"><div class="stat-val" style="color:#A78BFA">7</div><div class="stat-lbl">Años activos</div></div>';
    });
  },100);

  return '<div class="row" style="margin-bottom:22px;flex-wrap:wrap;gap:10px">'+
    '<div><h1 style="font-family:\'Rajdhani\',sans-serif;font-size:26px;font-weight:700">Panel de Administración</h1>'+
    '<p style="color:#4B5563;font-size:13px">EET N°23 "Caudillos Federales" · Carrera MMO</p></div>'+
    '<span class="sp"></span>'+
    '<span class="tag tag-admin">ADMIN</span>'+
    '</div>'+
    '<div class="stat-grid" id="admin-stats">'+
    '<div class="stat-card"><div class="spin-el" style="margin:0 auto"></div></div>'.repeat(4)+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div class="card">'+
      '<div class="card-title">Acciones rápidas</div>'+

function loadAssignSubjects(key){
  db.ref("users/"+key+"/subjects").once("value").then(function(snap){
    var assigned=snap.val()||{};
    var el=g("assign-subjects-body");if(!el)return;
    var html='<div style="display:flex;flex-direction:column;gap:12px">';
    YEARS.forEach(function(yr){
      html+='<div><div style="font-size:11px;color:#F97316;font-family:\'JetBrains Mono\',monospace;letter-spacing:1px;margin-bottom:7px;text-transform:uppercase">'+yr+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:7px">';
      SUBJECTS_BY_YEAR[yr].forEach(function(subj){
        var sid=yr.replace(/[°\s]/g,"_")+"_"+subj.replace(/[^\w]/g,"_");
        var checked=assigned[sid]?true:false;
        html+='<label style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;border:1px solid '+(checked?"#F9731650":"#1E2333")+';background:'+(checked?"#F9731612":"#11141C")+';cursor:pointer;font-size:12px">'+
          '<input type="checkbox" '+(checked?"checked":"")+' style="accent-color:#F97316" onchange="toggleSubject(\''+key+'\',\''+sid+'\',\''+yr+'\',\''+subj.replace(/'/g,"\\'")+'\',this.checked)">'+
          subj+'</label>';
      });
      html+='</div></div>';
    });
    html+='</div>';
    el.innerHTML=html;
  });
}

function toggleSubject(key,sid,year,subj,checked){
  var update={};
  if(checked){
    update["users/"+key+"/subjects/"+sid]={year:year,subject:subj};
  } else {
    db.ref("users/"+key+"/subjects/"+sid).remove();
    return;
  }
  db.ref().update(update).then(function(){toast(checked?"Materia asignada":"Materia removida");});
}

          '<button class="btn btn-primary" onclick="saveTask()">Crear tarea</button>'+
        '</div>'+

    window.closeModal=closeModal;

function saveTask(){
  var title=g("task-title").value.trim();
  var desc=g("task-desc").value.trim();
  var group=g("task-group").value;
  var due=g("task-due").value;
  if(!title){toast("Ingresá un título","err");return;}
  if(!group){toast("Seleccioná un grupo","err");return;}
  var parts=group.split("|");
  var key=emailToKey(STATE.profile.email);
  var task={
    title:title,description:desc,
    year:parts[0],subject:parts[1],
    teacherKey:key,teacherName:STATE.profile.name,
    dueDate:due?new Date(due).getTime():null,
    createdAt:Date.now(),status:"active",
    submissions:{}
  };
  db.ref("tasks").push(task).then(function(){
    closeModal();toast("Tarea creada exitosamente");loadTeacherTasks();
  });
}

function deleteTask(id){
  if(!confirm("¿Eliminar esta tarea?"))return;
  db.ref("tasks/"+id).remove().then(function(){toast("Tarea eliminada","info");loadTeacherTasks();});
}

function viewTaskMonitor(taskId){
  db.ref("tasks/"+taskId).once("value").then(function(snap){
    var task=snap.val();if(!task)return;
    // Load students in that year
    db.ref("users").once("value").then(function(usnap){
      var students=Object.values(usnap.val()||{}).filter(function(u){return u.role==="student"&&u.year===task.year;});
      var subs=task.submissions||{};
      var delivered=students.filter(function(s){return subs[emailToKey(s.email)];}).length;
      h("modal-root",'<div class="overlay" onclick="closeModal()">'+
        '<div class="modal" style="max-width:620px" onclick="event.stopPropagation()">'+
        '<div class="modal-header"><span class="modal-title">Monitor: '+task.title+'</span><button class="close-btn" onclick="closeModal()">×</button></div>'+
        '<div class="modal-body">'+
        '<div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:16px">'+
          '<div class="stat-card"><div class="stat-val" style="color:#10B981">'+delivered+'</div><div class="stat-lbl">Entregaron</div></div>'+
          '<div class="stat-card"><div class="stat-val" style="color:#EF4444">'+(students.length-delivered)+'</div><div class="stat-lbl">Pendiente</div></div>'+
          '<div class="stat-card"><div class="stat-val" style="color:#F97316">'+students.length+'</div><div class="stat-lbl">Total</div></div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:7px">'+
        students.map(function(s){
          var sub=subs[emailToKey(s.email)];
          return '<div class="task-row">'+
            avHtml(s.name,30)+
            '<span style="flex:1;font-size:13px;font-weight:600">'+s.name+'</span>'+
            (sub?
              '<span style="font-size:11px;color:#10B981">✓ '+fmtDateTime(sub.submittedAt)+'</span>'+
              '<span style="font-size:11px;background:#10B98120;color:#10B981;padding:2px 8px;border-radius:6px">Entregó</span>':
              '<span style="font-size:11px;background:#EF444420;color:#EF4444;padding:2px 8px;border-radius:6px">Pendiente</span>')+
          '</div>';
        }).join("")+
        (students.length===0?'<p style="color:#374151;text-align:center;padding:20px">No hay alumnos en este año todavía.</p>':'')+
        '</div>'+
        '<div class="modal-footer"><button class="btn" onclick="closeModal()">Cerrar</button></div>'+
        '</div></div></div>');
    });
  });
}

function loadStudentDashboard(){
  var key=emailToKey(STATE.profile.email);
  // Load tasks for this year
  db.ref("tasks").orderByChild("year").equalTo(STATE.profile.year).once("value").then(function(snap){
    var tasks=Object.entries(snap.val()||{}).map(function(e){return Object.assign({id:e[0]},e[1]);});
    var now=Date.now();
    var pending=tasks.filter(function(t){return t.status==="active"&&(!t.submissions||!t.submissions[key]);});
    var done=tasks.filter(function(t){return t.submissions&&t.submissions[key];});
    var overdue=pending.filter(function(t){return t.dueDate&&t.dueDate<now;});

    var statsEl=g("student-stats");
    if(statsEl) statsEl.innerHTML=
      '<div class="stat-card"><div class="stat-val" style="color:#EF4444">'+pending.length+'</div><div class="stat-lbl">Pendientes</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:#10B981">'+done.length+'</div><div class="stat-lbl">Completadas</div></div>'+
      '<div class="stat-card"><div class="stat-val" style="color:#F59E0B">'+(STATE.profile.streak||0)+'</div><div class="stat-lbl">Días de racha</div></div>';

    var ptEl=g("pending-tasks");
    if(!ptEl)return;
    if(pending.length===0){
      ptEl.innerHTML='<div style="text-align:center;padding:20px;color:#10B981"><span style="font-size:28px">✅</span><br><span style="font-size:13px">¡Todo al día! Sin tareas pendientes.</span></div>';
    } else {
      ptEl.innerHTML=pending.slice(0,4).map(function(t){
        var isOverdue=t.dueDate&&t.dueDate<now;
        return '<div class="task-row" style="cursor:pointer" onclick="setTab(\'tasks\')">'+
          '<span style="font-size:20px">'+(isOverdue?"🔴":"🟡")+'</span>'+
          '<div style="flex:1"><div style="font-size:13px;font-weight:700">'+t.title+'</div>'+
          '<div style="font-size:11px;color:'+(isOverdue?"#EF4444":"#4B5563")+'">'+(t.dueDate?("Vence: "+fmtDate(t.dueDate)):"Sin fecha límite")+'</div></div>'+
          '<span style="color:#374151">›</span>'+
        '</div>';
      }).join("")+
      (pending.length>4?'<div style="text-align:center;margin-top:8px"><button class="btn btn-sm" onclick="setTab(\'tasks\')">Ver todas ('+pending.length+')</button></div>':'');
    }
  });
}

function studentTasks(){
  return '<div class="row" style="margin-bottom:22px">'+
    '<h1 style="font-family:\'Rajdhani\',sans-serif;font-size:24px;font-weight:700">Mis Tareas</h1>'+
    '<span class="sp"></span>'+
    '</div>'+
    '<div id="student-tasks-list"><div style="text-align:center;padding:32px"><div class="spin-el" style="margin:0 auto"></div></div></div>';
}

function loadStudentTasks(){
  var key=emailToKey(STATE.profile.email);
  db.ref("tasks").orderByChild("year").equalTo(STATE.profile.year).once("value").then(function(snap){
    var tasks=Object.entries(snap.val()||{}).map(function(e){return Object.assign({id:e[0]},e[1]);});
    tasks.sort(function(a,b){return(b.dueDate||0)-(a.dueDate||0);});
    var el=g("student-tasks-list");if(!el)return;
    if(tasks.length===0){
      el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#374151">No hay tareas asignadas para tu curso todavía.</div>';
      return;
    }
    var now=Date.now();
    el.innerHTML=tasks.map(function(t){
      var submitted=t.submissions&&t.submissions[key];
      var isOverdue=t.dueDate&&t.dueDate<now&&!submitted;
      var statusColor=submitted?"#10B981":isOverdue?"#EF4444":"#F59E0B";
      var statusLabel=submitted?"✅ Entregado":isOverdue?"❌ Vencida":"⏳ Pendiente";
      return '<div class="card">'+
        '<div class="row" style="margin-bottom:10px;flex-wrap:wrap;gap:8px">'+
          '<div style="flex:1"><div style="font-size:16px;font-weight:700">'+t.title+'</div>'+
          '<div style="font-size:12px;color:#4B5563">'+t.subject+' · '+t.teacherName+'</div></div>'+
          '<span style="font-size:11px;background:'+statusColor+'18;color:'+statusColor+';border:1px solid '+statusColor+'30;padding:3px 10px;border-radius:5px;font-weight:700">'+statusLabel+'</span>'+
        '</div>'+
        (t.description?'<p style="font-size:13px;color:#9CA3AF;margin-bottom:12px">'+t.description+'</p>':'')+
        '<div class="row" style="flex-wrap:wrap;gap:8px">'+
          (t.dueDate?'<span style="font-size:12px;color:#4B5563">📅 Vence: '+fmtDateTime(t.dueDate)+'</span>':'')+
          '<span class="sp"></span>'+
          (!submitted?'<button class="btn btn-primary btn-sm" onclick="submitTask(\''+t.id+'\')">✓ Marcar como entregada</button>':'<span style="font-size:12px;color:#10B981">Entregado el '+fmtDateTime(t.submissions[key].submittedAt)+'</span>')+
        '</div>'+
      '</div>';
    }).join("");
  });
}

function submitTask(taskId){
  var key=emailToKey(STATE.profile.email);
  var now=Date.now();
  db.ref("tasks/"+taskId).once("value").then(function(snap){
    var task=snap.val();if(!task)return;
    var onTime=!task.dueDate||task.dueDate>=now;
    var pts=onTime?300:100;
    db.ref("tasks/"+taskId+"/submissions/"+key).set({
      submittedAt:now,onTime:onTime,studentName:STATE.profile.name
    });
    // Add points
    var newPts=(STATE.profile.points||0)+pts;
    STATE.profile.points=newPts;
    db.ref("users/"+key).update({points:newPts});
    toast("¡Tarea entregada! +"+(onTime?"300":"100")+" pts "+(onTime?"(a tiempo 🎉)":"(con retraso)"));
    loadStudentTasks();
  });
}
