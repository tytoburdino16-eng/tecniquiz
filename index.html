/* ── Form ── */

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}

.tag-gold{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B35}
.tag-sky{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B35}

/* ── Nav ── */
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:#64748B;border-left:3px solid transparent;transition:all .15s;font-weight:600}

/* ── List items ── */

/* ── Login screen ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,#F9731610 0%,transparent 60%)}

/* ── Grid bg ── */

var STATE={user:null,profile:null,tab:"dashboard",loading:true};

var AVC=["#F97316","#10B981","#F59E0B","#A78BFA","#F43F5E","#38BDF8","#EC4899","#34D399"];
function avCol(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AVC.length;return AVC[h];}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();}
function avHtml(name,size,extra){
  size=size||36;var c=avCol(name);extra=extra||"";
  return '<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+c+'20;border:2px solid '+c+'60;color:'+c+';font-size:'+Math.round(size*.34)+'px;'+extra+'">'+ini(name)+'</div>';
}
function g(id){return document.getElementById(id);}
function h(id,html){var el=g(id);if(el)el.innerHTML=html;}
function toast(msg,type){
  var el=g("toast");type=type||"ok";
  el.textContent=(type==="ok"?"✅ ":type==="err"?"❌ ":"ℹ️ ")+msg;
  el.style.display="block";clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display="none";},3200);
}
function emailToKey(e){return e.replace(/\./g,"_").replace(/@/g,"__");}
function keyToEmail(k){return k.replace(/__/g,"@").replace(/_/g,".");}
function fmtDate(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtDateTime(ts){if(!ts)return"—";var d=new Date(ts);return d.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"})+" "+d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});}
function isMobile(){return window.innerWidth<=700;}

auth.onAuthStateChanged(function(user){
  STATE.loading=false;
  if(!user){STATE.user=null;STATE.profile=null;render();return;}
  STATE.user=user;
  var key=emailToKey(user.email);
  db.ref("users/"+key).once("value").then(function(snap){
    if(snap.exists()){
      STATE.profile=snap.val();
      db.ref("users/"+key).update({lastLogin:Date.now(),photoURL:user.photoURL||""});
    } else {
      var role=ADMIN_EMAILS.indexOf(user.email)>=0?"admin":"student";
      var profile={email:user.email,name:user.displayName||user.email,role:role,photoURL:user.photoURL||"",createdAt:Date.now(),lastLogin:Date.now(),points:0,streak:0};
      STATE.profile=profile;
      db.ref("users/"+key).set(profile);
    }
    STATE.tab="dashboard";
    render();
  });
});

function loginGoogle(){
  auth.signInWithPopup(googleProvider).catch(function(e){toast("Error al iniciar sesión: "+e.message,"err");});
}
function logout(){
  auth.signOut().then(function(){STATE.user=null;STATE.profile=null;render();});
}

  var navHtml=tabs.map(function(t){
    return '<div class="nav-item'+(STATE.tab===t.id?" active":"")+'" onclick="setTab(\''+t.id+'\')">'+
      '<span style="font-size:16px">'+t.icon+'</span><span class="nav-label">'+t.label+'</span></div>';
  }).join("");

    '<div style="padding:16px 16px 12px;border-bottom:1px solid #1E2333">'+
      '<div style="font-family:\'Rajdhani\',sans-serif;font-size:18px;font-weight:700">TECNI<span style="color:#F97316">QUIZ</span></div>'+
      '<div style="font-size:9px;color:#374151;letter-spacing:1.5px;font-family:\'JetBrains Mono\',monospace;margin-top:2px">EET N°23</div>'+
    '</div>'+
    '<div class="nav-section">MENÚ</div>'+
    navHtml+
    '<div style="margin-top:auto;border-top:1px solid #1E2333;padding:12px 16px">'+
      '<div class="row" style="gap:10px">'+
        avHtml(STATE.profile.name,32)+
        '<div style="min-width:0;flex:1">'+
          '<div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+STATE.profile.name+'</div>'+
          '<div>'+roleTag+'</div>'+
        '</div>'+
        '<button onclick="logout()" style="background:none;border:none;color:#374151;cursor:pointer;font-size:18px" title="Salir">⏏</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── Bottom nav builder (mobile) ──
function buildBottomNav(tabs){
  return '<nav class="bottom-nav"><div class="bottom-nav-inner">'+
    tabs.map(function(t){
      return '<button class="bnav-item'+(STATE.tab===t.id?" active":"")+'" onclick="setTab(\''+t.id+'\')">'+
        '<span class="ico">'+t.icon+'</span>'+
        '<span>'+t.label+'</span>'+

  if(!STATE.user||!STATE.profile){app.innerHTML=renderLogin();setTimeout(startLoginCanvas,50);return;}

function startLoginCanvas(){
  var cv=document.getElementById('tq-cv');
  if(!cv) return;
  var ctx=cv.getContext('2d');
  var wrap=document.getElementById('tq-login');
  var W,H,T=0,mouse={x:-999,y:-999};
  var particles=[],energyLines=[];

  var SYMS=[
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(s*.3);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;ctx.strokeRect(-s,-s*1.3,s*2,s*2.6);ctx.beginPath();ctx.moveTo(0,-s*1.3);ctx.lineTo(0,s*1.3);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(T*.008);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;var teeth=6,r1=s,r2=s*1.4;ctx.beginPath();for(var i=0;i<teeth*2;i++){var angle=(i/teeth)*Math.PI;var r=i%2===0?r1:r2;i===0?ctx.moveTo(Math.cos(angle)*r,Math.sin(angle)*r):ctx.lineTo(Math.cos(angle)*r,Math.sin(angle)*r);}ctx.closePath();ctx.stroke();ctx.beginPath();ctx.arc(0,0,s*.5,0,Math.PI*2);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(s*.5);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,-s*1.3);ctx.lineTo(s*1.1,s*.8);ctx.lineTo(-s*1.1,s*.8);ctx.closePath();ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(0,0,s*.35,0,Math.PI*2);ctx.fillStyle='rgba(249,115,22,'+a+')';ctx.fill();for(var i=0;i<3;i++){ctx.save();ctx.rotate((i/3)*Math.PI+T*.01);ctx.beginPath();ctx.ellipse(0,0,s*1.2,s*.4,0,0,Math.PI*2);ctx.stroke();ctx.restore();}ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/4);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;ctx.strokeRect(-s*1.4,-s*.4,s*2.8,s*.8);for(var i=-3;i<=3;i++){var h=i%2===0?s*.6:s*.35;ctx.beginPath();ctx.moveTo(i*s*.4,-h/2);ctx.lineTo(i*s*.4,h/2);ctx.stroke();}ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,-s*.2,s*.8,Math.PI*.2,Math.PI*.8,true);ctx.lineTo(-s*.4,s*.6);ctx.lineTo(s*.4,s*.6);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.3,s*.7);ctx.lineTo(s*.3,s*.7);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.2,s*.9);ctx.lineTo(s*.2,s*.9);ctx.stroke();for(var r=0;r<6;r++){var ra=(r/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(ra)*s*.95,Math.sin(ra)*s*.95-s*.2);ctx.lineTo(Math.cos(ra)*s*1.3,Math.sin(ra)*s*1.3-s*.2);ctx.stroke();}ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(-s*1.1,-s*.7);ctx.lineTo(s*1.1,-s*.7);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.5,-s*.7);ctx.lineTo(-s*.5,s*.8);ctx.stroke();ctx.beginPath();ctx.moveTo(s*.5,-s*.7);ctx.bezierCurveTo(s*.5,s*.2,s*1.0,s*.5,s*.8,s*.8);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(-Math.PI/6);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-s*1.2,s*.6);ctx.lineTo(0,-s*1.0);ctx.lineTo(s*1.2,s*.6);ctx.stroke();ctx.beginPath();ctx.arc(0,s*.6,s*.5,Math.PI,0);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=.9;ctx.strokeRect(-s*1.1,-s*.8,s*2.2,s*1.6);ctx.beginPath();ctx.moveTo(-s*.6,-s*.3);ctx.lineTo(s*.6,-s*.3);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.4,s*.1);ctx.lineTo(s*.4,s*.1);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;var p=5,ro=s*1.2,ri=s*.5;ctx.beginPath();for(var i=0;i<p*2;i++){var an=i*Math.PI/p-Math.PI/2;var r=i%2===0?ro:ri;i===0?ctx.moveTo(Math.cos(an)*r,Math.sin(an)*r):ctx.lineTo(Math.cos(an)*r,Math.sin(an)*r);}ctx.closePath();ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-s,-s);ctx.lineTo(-s,s);ctx.lineTo(s,s);ctx.stroke();ctx.restore();},
    function(x,y,s,a){ctx.save();ctx.translate(x,y);ctx.rotate(T*.005);ctx.strokeStyle='rgba(249,115,22,'+a+')';ctx.lineWidth=.9;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-s,0);ctx.lineTo(s,0);ctx.moveTo(0,-s);ctx.lineTo(0,s);ctx.stroke();ctx.restore();},
  ];

  function mkP(){
    return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.32,vy:(Math.random()-.5)*.32,s:Math.random()*6+3,type:Math.floor(Math.random()*SYMS.length),a:Math.random()*.22+.05,ph:Math.random()*Math.PI*2};
  }

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    particles=[];
    var n=Math.min(Math.floor((W*H)/5500),120);
    for(var i=0;i<n;i++) particles.push(mkP());
  }

  function spawnLine(){
    if(energyLines.length>15) return;
    energyLines.push({x:Math.random()<.5?0:W,y:Math.random()*H,vx:(Math.random()<.5?1:-1)*(Math.random()*.7+.3),vy:(Math.random()-.5)*.5,hist:[],a:Math.random()*.35+.1,maxLen:Math.random()*90+40,life:1});
  }

  function frame(){
    T++;
    ctx.clearRect(0,0,W,H);
    var grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
    grad.addColorStop(0,'#0C0F1A');grad.addColorStop(1,'#060810');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(249,115,22,0.04)';ctx.lineWidth=.5;
    for(var x=0;x<W;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(var y=0;y<H;y+=56){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    if(T%40===0) spawnLine();
    energyLines=energyLines.filter(function(l){return l.life>.01;});
    energyLines.forEach(function(l){
      l.hist.push({x:l.x,y:l.y});
      if(l.hist.length>l.maxLen) l.hist.shift();
      l.x+=l.vx;l.y+=l.vy;l.life-=.004;
      if(l.x<-20||l.x>W+20||l.y<-20||l.y>H+20) l.life=0;
      if(l.hist.length>2){
        for(var i=1;i<l.hist.length;i++){
          ctx.beginPath();ctx.moveTo(l.hist[i-1].x,l.hist[i-1].y);ctx.lineTo(l.hist[i].x,l.hist[i].y);
          ctx.strokeStyle='rgba(249,115,22,'+(i/l.hist.length*l.a*l.life)+')';ctx.lineWidth=.8;ctx.stroke();
        }
      }
    });
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-60)p.x=W+60;if(p.x>W+60)p.x=-60;
      if(p.y<-60)p.y=H+60;if(p.y>H+60)p.y=-60;
      var dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
      var glow=d<150?((150-d)/150):0;
      var a=Math.min(p.a+glow*.65+Math.sin(T*.018+p.ph)*.03,.92);
      SYMS[p.type](p.x,p.y,p.s,a);
      particles.forEach(function(q){
        if(q===p) return;
        var ddx=p.x-q.x,ddy=p.y-q.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<85){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle='rgba(249,115,22,'+((1-dd/85)*0.07+(glow*.12))+')';ctx.lineWidth=.5;ctx.stroke();}
      });
    });
    if(mouse.x>0&&mouse.x<W){
      var mg=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,180);
      mg.addColorStop(0,'rgba(249,115,22,0.08)');mg.addColorStop(1,'rgba(249,115,22,0)');
      ctx.fillStyle=mg;ctx.fillRect(0,0,W,H);
    }
    for(var o=0;o<3;o++){
      var ox=W*.2+Math.sin(T*.005+o*2.1)*W*.3+o*W*.25;
      var oy=H*.3+Math.cos(T*.007+o*1.7)*H*.2;
      var og=ctx.createRadialGradient(ox,oy,0,ox,oy,90+o*20);
      og.addColorStop(0,'rgba(249,115,22,0.04)');og.addColorStop(1,'rgba(249,115,22,0)');
      ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
    }
    requestAnimationFrame(frame);
  }
  wrap.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  wrap.addEventListener('mouseleave',function(){mouse.x=-999;mouse.y=-999;});
  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(frame);
}

function loadAssignSubjects(key){
  db.ref("users/"+key+"/subjects").once("value").then(function(snap){
    var assigned=snap.val()||{};
    var el=g("assign-subjects-body");if(!el)return;
    var html='<div style="display:flex;flex-direction:column;gap:12px">';
    YEARS.forEach(function(yr){
      html+='<div><div style="font-size:11px;color:#F97316;font-family:\'JetBrains Mono\',monospace;letter-spacing:1px;margin-bottom:7px;text-transform:uppercase">'+yr+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:7px">';
      SUBJECTS_BY_YEAR[yr].forEach(function(subj){
        var sid=yr.replace(/[°\s]/g,"_")+"_"+subj.replace(/[^\w]/g,"_");
        var checked=assigned[sid]?true:false;
        html+='<label style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid '+(checked?"#F9731650":"#1E2333")+';background:'+(checked?"#F9731612":"#11141C")+';cursor:pointer;font-size:12px">'+
          '<input type="checkbox" '+(checked?"checked":"")+' style="accent-color:#F97316" onchange="toggleSubject(\''+key+'\',\''+sid+'\',\''+yr+'\',\''+subj.replace(/'/g,"\\'")+'\',this.checked)">'+
          subj+'</label>';
      });
      html+='</div></div>';
    });
    html+='</div>';
    el.innerHTML=html;
  });
}

function toggleSubject(key,sid,year,subj,checked){
  if(checked){
    db.ref("users/"+key+"/subjects/"+sid).set({year:year,subject:subj}).then(function(){toast("Materia asignada");});
  } else {
    db.ref("users/"+key+"/subjects/"+sid).remove().then(function(){toast("Materia removida","info");});
  }
}

function teacherCorregirEntrega(taskId, studentKey){
  db.ref('tasks/'+taskId).once('value').then(function(snap){
    var task=snap.val(); if(!task) return;
    var sub=task.submissions&&task.submissions[studentKey]; if(!sub) return;
    var n=(task.consignas||[]).length;
    var pts=task.ptsPorConsigna||Math.floor(1000/n);

    var html='<div class="overlay" onclick="closeModal()">'+
      '<div class="modal" onclick="event.stopPropagation()" style="max-width:680px;overflow-y:auto">'+
        '<div class="modal-header" style="position:sticky;top:0;background:#0F1117;z-index:2">'+
          '<span class="modal-title">Corregir: '+(sub.studentName||studentKey)+'</span>'+
          '<button class="close-btn" onclick="closeModal()">×</button>'+
        '</div>'+
        '<div class="modal-body">';

    (task.consignas||[]).forEach(function(q,i){
      var resp=(sub.respuestas&&sub.respuestas[i])||'(Sin respuesta)';
      var prevCor=sub.correcciones&&sub.correcciones[i];
      html+='<div style="background:#11141C;border:1px solid #1E2333;border-radius:10px;padding:14px;margin-bottom:12px">'+
        '<div class="row" style="margin-bottom:8px">'+
          '<span style="font-size:12px;font-weight:700;color:#F97316;font-family:monospace">CONSIGNA '+(i+1)+'</span>'+
          '<span class="sp"></span>'+
          '<span style="font-size:11px;color:#4B5563">Máx '+pts+' pts</span>'+
        '</div>'+
        '<div style="font-size:13px;font-weight:600;color:#F0EDE8;margin-bottom:8px">'+q+'</div>'+
        '<div style="background:#080A0F;border:1px solid #1E2333;border-radius:8px;padding:10px;font-size:13px;color:#9CA3AF;margin-bottom:10px">'+resp+'</div>'+
        '<div style="display:grid;grid-template-columns:100px 1fr;gap:10px">'+
          '<div><label class="field-label">Puntos</label>'+
            '<input type="number" id="cor-pts-'+i+'" min="0" max="'+pts+'" value="'+(prevCor?prevCor.pts:pts)+'" style="width:100%"></div>'+
          '<div><label class="field-label">Feedback <span style="color:#374151;font-weight:400">(opcional)</span></label>'+
            '<input type="text" id="cor-fb-'+i+'" value="'+(prevCor&&prevCor.feedback?prevCor.feedback:'')+'" placeholder="Comentario al alumno..."></div>'+
        '</div>'+
      '</div>';
    });

    html+='<div id="cor-total" style="background:#F9731618;border:1px solid #F9731630;border-radius:8px;padding:12px;text-align:center;font-size:14px;font-weight:700;color:#F97316;margin-bottom:14px">'+
      'Total: calculando...</div>'+
      '<div class="modal-footer">'+
        '<button class="btn" onclick="closeModal()">Cancelar</button>'+
        '<button class="btn btn-primary" data-task="'+taskId+'" data-skey="'+studentKey+'" data-n="'+n+'" data-pts="'+pts+'" onclick="guardarCorreccion(this.dataset.task,this.dataset.skey,parseInt(this.dataset.n),parseInt(this.dataset.pts))">Guardar corrección</button>'+
      '</div>'+
    '</div></div></div>';

    h('modal-root',html);

    // Live total calculation
    setTimeout(function(){
      for(var j=0;j<n;j++){
        var el=g('cor-pts-'+j);
        if(el) el.addEventListener('input',function(){ calcCorTotal(n); });
      }
      calcCorTotal(n);
    },100);
  });
}

function calcCorTotal(n){
  var total=0;
  for(var i=0;i<n;i++){
    var el=g('cor-pts-'+i);
    total+=(el?parseInt(el.value)||0:0);
  }
  var ct=g('cor-total');
  if(ct) ct.textContent='Total: '+total+' / 1000 pts';
}

function guardarCorreccion(taskId, studentKey, n, maxPts){
  var correcciones={}, total=0;
  for(var i=0;i<n;i++){
    var p=parseInt(g('cor-pts-'+i)?g('cor-pts-'+i).value:0)||0;
    var f=g('cor-fb-'+i)?g('cor-fb-'+i).value.trim():'';
    p=Math.max(0,Math.min(maxPts,p));
    correcciones[i]={pts:p,feedback:f};
    total+=p;
  }
  var updates={};
  updates['tasks/'+taskId+'/submissions/'+studentKey+'/correcciones']=correcciones;
  updates['tasks/'+taskId+'/submissions/'+studentKey+'/ptsTotal']=total;
  updates['tasks/'+taskId+'/submissions/'+studentKey+'/corregido']=true;
  updates['tasks/'+taskId+'/submissions/'+studentKey+'/corregidoEn']=Date.now();

  // Add points to student global ranking
  var newPts=(STATE.profile.points||0);
  db.ref('users/'+studentKey+'/points').transaction(function(cur){return (cur||0)+total;});

  db.ref().update(updates).then(function(){
    closeModal();
    toast('Corrección guardada · '+total+' pts asignados ✓');
  });
}

function checkBancoMateria(materia){
  var info = g('qs-banco-info');
  if(!info) return;
  info.textContent = 'Verificando banco...';
  db.ref('banco').once('value').then(function(snap){
    var count = 0;
    snap.forEach(function(child){
      var p = child.val();
      if(p && p.materia && p.materia.trim().toLowerCase()===materia.trim().toLowerCase()) count++;
    });
    if(count === 0){
      info.innerHTML = '<span style="color:#EF4444">⚠ Sin preguntas en Firebase para esta materia. Se usarán preguntas locales.</span>';
    } else {
      info.innerHTML = '<span style="color:#10B981">✓ '+count+' preguntas disponibles en el banco</span>';
    }
  });
}

function teacherCrearSala(){
  var materia = g('qs-materia') ? g('qs-materia').value : 'General';
  var count = parseInt(g('qs-count') ? g('qs-count').value : 10);
  var timerSeg = parseInt(g('qs-timer') ? g('qs-timer').value : 20);
  var key = emailToKey(STATE.profile.email);

  // Mostrar spinner en el botón
  var btn = document.querySelector('#quiz-modal-root .btn-primary');
  if(btn){ btn.textContent='Cargando preguntas...'; btn.disabled=true; }

  var trimestre = g('qs-trimestre') ? g('qs-trimestre').value : 'todos';
  var anio = g('qs-anio') ? g('qs-anio').value : 'todos';
  var tema = g('qs-tema') ? g('qs-tema').value.trim().toLowerCase() : '';

  // Leer preguntas del banco Firebase con filtros
  db.ref('banco').once('value').then(function(snap){
    var pool = [];
    snap.forEach(function(child){
      var p = child.val();
      if(!p || !p.materia) return;
      // Filtro materia
      if(p.materia.trim().toLowerCase() !== materia.trim().toLowerCase()) return;
      // Filtro trimestre
      if(trimestre !== 'todos' && p.trimestre && p.trimestre !== 'todos' && p.trimestre !== trimestre) return;
      // Filtro año
      if(anio !== 'todos' && p.anio && p.anio !== 'todos' && p.anio !== anio) return;
      // Filtro tema (búsqueda parcial)
      if(tema && p.tema && !p.tema.toLowerCase().includes(tema)) return;
      pool.push(p);
    });

    // Si no hay en Firebase, usar banco local
    if(pool.length === 0){
      pool = (QUESTION_BANK[materia]||GENERIC_QUESTIONS).map(function(pq){
        return {pregunta:pq.q, opciones:pq.opts, correcta:pq.a, materia:materia};
      });
    }

    if(pool.length === 0){
      toast('No hay preguntas cargadas para esta materia. Agregá desde el banco.','err');
      if(btn){ btn.textContent='Crear sala ⚡'; btn.disabled=false; }
      return;
    }

    // Mezclar preguntas y opciones aleatoriamente
    var shuffled = pool.slice().sort(function(){return Math.random()-.5;});
    var preguntas = shuffled.slice(0, Math.min(count, shuffled.length)).map(function(pq){
      // Mezclar opciones (Fisher-Yates) para que la correcta no sea siempre la misma posición
      var opciones = (pq.opciones||[]).slice();
      var correctaText = opciones[pq.correcta];
      for(var j=opciones.length-1;j>0;j--){
        var k=Math.floor(Math.random()*(j+1));
        var tmp=opciones[j];opciones[j]=opciones[k];opciones[k]=tmp;
      }
      var newCorrecta = opciones.indexOf(correctaText);
      return {q: pq.pregunta, opts: opciones, a: newCorrecta};
    });

    var codigo = genCode();
    var sala = {
      codigo: codigo,
      materia: materia,
      trimestre: trimestre !== 'todos' ? trimestre : null,
      anio: anio !== 'todos' ? anio : null,
      tema: tema || null,
      docente: STATE.profile.name,
      docenteKey: key,
      estado: 'waiting',
      preguntaActual: -1,
      timerSeg: timerSeg,
      preguntas: preguntas,
      creadaEn: Date.now(),
      jugadores: {},
      respuestas: {},
    };

    db.ref('salas/'+codigo).set(sala).then(function(){
      closeQModal();
      var filtroInfo = [materia, trimestre!=='todos'?trimestre:'', anio!=='todos'?anio:'', tema].filter(Boolean).join(' · ');
    toast('Sala '+codigo+' creada · '+preguntas.length+' preguntas · '+filtroInfo);
      teacherMonitorSala(codigo);
    });
  });
}

function teacherSiguientePregunta(codigo){
  db.ref('salas/'+codigo).once('value').then(function(snap){
    var sala = snap.val();
    if(!sala) return;
    var next = sala.preguntaActual + 1;
    if(next >= sala.preguntas.length){
      db.ref('salas/'+codigo+'/estado').set('finished');
      toast('¡Quiz finalizado!');
    } else {
      db.ref('salas/'+codigo+'/preguntaActual').set(next);
      db.ref('salas/'+codigo+'/timerInicio').set(Date.now());
    }
  });
}

function studentMostrarPregunta(sala, codigo){
  var idx = sala.preguntaActual;
  var pq = sala.preguntas[idx];
  if(!pq) return;

  var key = emailToKey(STATE.profile.email);
  var yaRespondio = sala.respuestas && sala.respuestas['p'+idx] && sala.respuestas['p'+idx][key];

  var tiempoTranscurrido = sala.timerInicio ? Math.floor((Date.now() - sala.timerInicio)/1000) : 0;
  var tiempoRestante = Math.max(0, sala.timerSeg - tiempoTranscurrido);

  var area = g('student-quiz-area');
  if(!area) return;

  area.innerHTML =
    '<div class="card">'+
      '<div class="row" style="margin-bottom:14px">'+
        '<span style="font-size:12px;color:#4B5563;font-family:monospace">Pregunta '+(idx+1)+' de '+sala.preguntas.length+'</span>'+
        '<span class="sp"></span>'+
        '<span id="quiz-timer" style="font-family:\'Rajdhani\',sans-serif;font-size:22px;font-weight:700;color:'+(tiempoRestante<=5?'#EF4444':'#F97316')+'">'+tiempoRestante+'s</span>'+
      '</div>'+
      '<div style="height:4px;background:#1E2333;border-radius:2px;margin-bottom:18px;overflow:hidden">'+
        '<div id="quiz-timer-bar" style="height:100%;background:#F97316;border-radius:2px;transition:width .9s linear;width:'+(tiempoRestante/sala.timerSeg*100)+'%"></div>'+
      '</div>'+
      '<div style="font-size:17px;font-weight:700;margin-bottom:20px;line-height:1.4">'+pq.q+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" id="opciones-grid">'+
      (yaRespondio
        ? pq.opts.map(function(op,i){
            var correct = i === pq.a;
            var chosen = sala.respuestas['p'+idx][key].opcion === i;
            var bg = correct?'#10B98118':chosen?'#EF444418':'#11141C';
            var bc = correct?'#10B981':chosen?'#EF4444':'#1E2333';
            var tc = correct?'#10B981':chosen?'#EF4444':'#4B5563';
            return '<div style="padding:14px;border-radius:10px;border:1px solid '+bc+';background:'+bg+';font-size:14px;font-weight:'+(correct||chosen?'700':'400')+';color:'+tc+'">'+
              '<span style="opacity:.6">'+['A','B','C','D'][i]+'. </span>'+op+
              (correct?' ✓':'')+(chosen&&!correct?' ✗':'')+
            '</div>';
          }).join('')
        : pq.opts.map(function(op,i){
            return '<button onclick="studentResponder(\''+codigo+'\','+idx+','+i+')" style="padding:14px;border-radius:10px;border:1px solid #1E2333;background:#11141C;color:#F0EDE8;font-size:14px;cursor:pointer;text-align:left;transition:all .15s;font-family:\'Nunito\',sans-serif" onmouseover="this.style.borderColor=\'#F97316\';this.style.background=\'#F9731610\'" onmouseout="this.style.borderColor=\'#1E2333\';this.style.background=\'#11141C\'">'+
              '<span style="color:#F97316;font-weight:700">'+['A','B','C','D'][i]+'. </span>'+op+
            '</button>';
          }).join('')
      )+

    '</div>';

  // Timer countdown
  if(QUIZ.timer) clearInterval(QUIZ.timer);
  if(!yaRespondio){
    QUIZ.tiempoRespuesta = Date.now();
    QUIZ.timer = setInterval(function(){
      tiempoTranscurrido = Math.floor((Date.now() - sala.timerInicio)/1000);
      tiempoRestante = Math.max(0, sala.timerSeg - tiempoTranscurrido);
      var tel = g('quiz-timer');
      var bar = g('quiz-timer-bar');
      if(tel){
        tel.textContent = tiempoRestante+'s';
        tel.style.color = tiempoRestante <= 5 ? '#EF4444' : '#F97316';
      }
      if(bar) bar.style.width = (tiempoRestante/sala.timerSeg*100)+'%';
      if(tiempoRestante <= 0){
        clearInterval(QUIZ.timer);
        // Auto-marcar sin respuesta
        var key2 = emailToKey(STATE.profile.email);
        db.ref('salas/'+codigo+'/respuestas/p'+idx+'/'+key2).set({opcion:-1,tiempo:sala.timerSeg,pts:0});
      }
    }, 500);
  }
}

function studentResponder(codigo, idx, opcion){
  var key = emailToKey(STATE.profile.email);
  if(QUIZ.timer) clearInterval(QUIZ.timer);
  var tiempoUsado = QUIZ.tiempoRespuesta ? (Date.now() - QUIZ.tiempoRespuesta)/1000 : 20;

  db.ref('salas/'+codigo).once('value').then(function(snap){
    var sala = snap.val();
    if(!sala) return;
    var pq = sala.preguntas[idx];
    var correcto = opcion === pq.a;
    var timerSeg = sala.timerSeg || 20;
    var pts = 0;
    if(correcto){
      // Bonus por velocidad: máx 800, mín 200, proporcional al tiempo restante
      var factor = Math.max(0, 1 - tiempoUsado/timerSeg);
      pts = Math.round(200 + 600*factor);
    }
    // Guardar respuesta
    db.ref('salas/'+codigo+'/respuestas/p'+idx+'/'+key).set({
      opcion: opcion,
      tiempo: Math.round(tiempoUsado*10)/10,
      pts: pts,
      correcto: correcto,
    });
    // Actualizar puntos acumulados del jugador en la sala
    db.ref('salas/'+codigo+'/jugadores/'+key+'/pts').transaction(function(current){
      return (current||0) + pts;
    });
    // Actualizar puntos globales del usuario
    if(pts > 0){
      var newPts = (STATE.profile.points||0) + pts;
      STATE.profile.points = newPts;
      db.ref('users/'+key).update({points: newPts});
    }
    if(correcto){
      toast('+'+pts+' pts ⚡ ¡Correcto!');
    } else {
      toast('Incorrecto 😞 La respuesta era: '+pq.opts[pq.a]);
    }
  });
}

function studentMostrarResultado(sala, codigo){
  var key = emailToKey(STATE.profile.email);
  var jugadores = Object.values(sala.jugadores||{});

function loadBankQuestions(){
  db.ref('banco').once('value').then(function(snap){
    var todas = [];
    snap.forEach(function(child){
      todas.push(Object.assign({id: child.key}, child.val()));
    });

    // Si no hay preguntas aún, cargar las del banco local
    if(todas.length === 0){
      bankSeedInitial(function(){
        db.ref('banco').once('value').then(function(snap2){
          var seeded = [];
          snap2.forEach(function(child){ seeded.push(Object.assign({id:child.key},child.val())); });
          renderBankList(seeded);
        });
      });
      return;
    }
    renderBankList(todas);
  });
}

function bankSeedInitial(cb){
  // Seed con el banco existente del quiz module
  var updates = {};
  Object.keys(QUESTION_BANK).forEach(function(materia){
    QUESTION_BANK[materia].forEach(function(pq){
      var key2 = db.ref('banco').push().key;
      updates['banco/'+key2] = {
        pregunta: pq.q,
        opciones: pq.opts,
        correcta: pq.a,
        materia: materia,
        anio: '7° Año',
        dificultad: 'media',
        creadoPor: STATE.profile.email,
        creadoEn: Date.now(),
      };
    });
  });
  GENERIC_QUESTIONS.forEach(function(pq){
    var key2 = db.ref('banco').push().key;
    updates['banco/'+key2] = {
      pregunta: pq.q,
      opciones: pq.opts,
      correcta: pq.a,
      materia: 'General',
      anio: 'todos',
      dificultad: 'media',
      creadoPor: STATE.profile.email,
      creadoEn: Date.now(),
    };
  });
  db.ref().update(updates).then(function(){
    toast('Banco inicializado con '+Object.keys(updates).length+' preguntas');
    if(cb) cb();
  });
}

function bankFiltrar(){
  var materia = g('bank-filtro-materia') ? g('bank-filtro-materia').value : 'todas';
  var anio = g('bank-filtro-anio') ? g('bank-filtro-anio').value : 'todos';
  var search = g('bank-search') ? g('bank-search').value.toLowerCase() : '';
  BANK_STATE.filtroMateria = materia;
  BANK_STATE.filtroAnio = anio;

  db.ref('banco').once('value').then(function(snap){
    var todas = [];
    snap.forEach(function(child){ todas.push(Object.assign({id:child.key},child.val())); });
    var filtered = todas.filter(function(p){
      var matchM = materia==='todas' || p.materia===materia;
      var matchA = anio==='todos' || p.anio===anio;
      var matchS = !search || p.pregunta.toLowerCase().includes(search);
      return matchM && matchA && matchS;
    });
    renderBankList(filtered, todas.length);
  });
}

    '<div class="stat-card"><div class="stat-val" style="color:#F97316">'+totalAll+'</div><div class="stat-lbl">Total preguntas</div></div>'+
    '<div class="stat-card"><div class="stat-val" style="color:#10B981">'+preguntas.length+'</div><div class="stat-lbl">Filtradas</div></div>'+
    '<div class="stat-card"><div class="stat-val" style="color:#A78BFA">'+Object.keys(materias).length+'</div><div class="stat-lbl">Materias</div></div>';

  if(preguntas.length === 0){
    el.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:#374151">No hay preguntas con ese filtro.</div>';
    return;
  }

  var difs = {facil:'#10B981',media:'#F59E0B',dificil:'#EF4444'};

  el.innerHTML = preguntas.map(function(p, i){
    return '<div class="card" style="margin-bottom:10px">'+
      '<div class="row" style="margin-bottom:10px;flex-wrap:wrap;gap:6px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:14px;font-weight:700;line-height:1.4">'+p.pregunta+'</div>'+
          '<div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">'+
            '<span class="tag tag-teacher" style="font-size:9px">'+p.materia+'</span>'+
            (p.anio&&p.anio!=='todos'?'<span class="tag tag-muted" style="font-size:9px">'+p.anio+'</span>':'')+
            '<span style="font-size:10px;padding:2px 8px;border-radius:5px;background:'+(difs[p.dificultad]||'#374151')+'20;color:'+(difs[p.dificultad]||'#374151')+';font-weight:700">'+( p.dificultad||'media')+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="row" style="gap:6px">'+
          '<button class="btn btn-sm" onclick="bankEditarPregunta(\''+p.id+'\')">✏️</button>'+
          '<button class="btn btn-sm btn-danger" onclick="bankEliminar(\''+p.id+'\')">✕</button>'+
        '</div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+
      (p.opciones||[]).map(function(op,j){
        var correct = j === p.correcta;
        return '<div style="padding:8px 12px;border-radius:8px;border:1px solid '+(correct?'#10B981':'#1E2333')+';background:'+(correct?'#10B98114':'#11141C')+';font-size:12px;color:'+(correct?'#10B981':'#6B7280')+'">'+
          '<span style="font-weight:700">'+['A','B','C','D'][j]+'.</span> '+op+
          (correct?' ✓':'')+
        '</div>';
      }).join('')+
      '</div>'+

  }).join('');
}

function bankEditarPregunta(id){ openBankModal(id); }

function closeBankModal(){ h('bank-modal-root',''); }

function bankGuardar(id){
  var pregunta = g('bq-pregunta') ? g('bq-pregunta').value.trim() : '';
  var a = g('bq-a') ? g('bq-a').value.trim() : '';
  var b = g('bq-b') ? g('bq-b').value.trim() : '';
  var c2 = g('bq-c') ? g('bq-c').value.trim() : '';
  var d = g('bq-d') ? g('bq-d').value.trim() : '';
  var correcta = g('bq-correcta') ? parseInt(g('bq-correcta').value) : 0;
  var materia = g('bq-materia') ? g('bq-materia').value : 'General';
  var anio = g('bq-anio') ? g('bq-anio').value : 'todos';
  var dificultad = g('bq-dificultad') ? g('bq-dificultad').value : 'media';

  if(!pregunta){ toast('Ingresá la pregunta','err'); return; }
  if(!a||!b||!c2||!d){ toast('Completá las 4 opciones','err'); return; }

  var data = {
    pregunta: pregunta,
    opciones: [a,b,c2,d],
    correcta: correcta,
    materia: materia,
    anio: anio,
    dificultad: dificultad,
    creadoPor: STATE.profile.email,
    creadoEn: id ? undefined : Date.now(),
    editadoEn: id ? Date.now() : undefined,
  };
  // Remove undefined
  Object.keys(data).forEach(function(k){ if(data[k]===undefined) delete data[k]; });

  var ref = id ? db.ref('banco/'+id) : db.ref('banco').push();
  var op = id ? ref.update(data) : ref.set(data);

  op.then(function(){
    closeBankModal();
    toast(id ? 'Pregunta actualizada' : 'Pregunta agregada ✓');
    loadBankQuestions();
  });
}

function bankEliminar(id){
  if(!confirm('¿Eliminar esta pregunta?')) return;
  db.ref('banco/'+id).remove().then(function(){
    toast('Pregunta eliminada','info');
    loadBankQuestions();
  });
}

          '<input type="text" id="csv-tema" placeholder="Ej: Unidad 2 — Ventilación" style="width:100%">'+
        '</div>'+
        '<div style="margin-bottom:14px">'+
          '<label class="field-label">Seleccionar archivo CSV</label>'+
          '<input type="file" id="csv-file" accept=".csv,.txt" style="width:100%;padding:10px;background:#080A0F;border:1.5px solid #1E2333;border-radius:8px;color:#F0EDE8;cursor:pointer">'+
        '</div>'+
        '<div id="csv-preview" style="display:none">'+
          '<div class="card-title" id="csv-preview-title"></div>'+
          '<div id="csv-preview-list" style="max-height:240px;overflow-y:auto"></div>'+
        '</div>'+
        '<div class="modal-footer">'+
          '<button class="btn" onclick="closeTBModal()">Cancelar</button>'+
          '<button class="btn btn-primary" id="csv-import-btn" onclick="csvDoImport()" style="display:none">✓ Importar todas</button>'+
        '</div>'+
      '</div>'+
    '</div></div>'
  );

  // Listener para el file input
  setTimeout(function(){
    var fileInput = document.getElementById('csv-file');
    if(fileInput) fileInput.addEventListener('change', csvPreview);
  }, 100);
}

var CSV_PARSED = [];

function csvPreview(e){
  var file = e.target.files[0];
  if(!file){ return; }
  var reader = new FileReader();
  reader.onload = function(ev){
    var text = ev.target.result;
    CSV_PARSED = csvParse(text);
    var preview = document.getElementById('csv-preview');
    var previewTitle = document.getElementById('csv-preview-title');
    var previewList = document.getElementById('csv-preview-list');
    var importBtn = document.getElementById('csv-import-btn');
    if(!preview||!previewTitle||!previewList||!importBtn) return;

    if(CSV_PARSED.length === 0){
      var rawText2 = ev.target.result.replace(/^\uFEFF/,'');
      var lineCount = rawText2.split(/\r?\n/).filter(function(l){return l.trim().length>3;}).length;
      var firstLine2 = rawText2.split(/\r?\n/).find(function(l){return l.trim().length>3;})||'';
      var colCount = Math.max((firstLine2.match(/;/g)||[]).length,(firstLine2.match(/,/g)||[]).length,(firstLine2.match(/\t/g)||[]).length)+1;
      previewTitle.innerHTML = '<span style="color:#EF4444">⚠ No se encontraron preguntas válidas</span>'+
        '<div style="font-size:12px;color:#4B5563;margin-top:6px">'+
        'Líneas detectadas: '+lineCount+' · Columnas en línea 1: '+colCount+'<br>'+
        'Necesitás al menos 5 columnas: pregunta, correcta, op2, op3, op4<br>'+
        'Separador detectado: '+(firstLine2.indexOf(';')>-1?'punto y coma':firstLine2.indexOf('\t')>-1?'tabulación':'coma')+
        '</div>';
      preview.style.display='block';
      return;
    }

    // Detect separator for display
    var rawText = ev.target.result.replace(/^\uFEFF/,'');
    var firstLine = rawText.split(/\r?\n/)[0]||'';
    var sepName = (firstLine.indexOf(';')>-1 && (firstLine.match(/;/g)||[]).length>=4)?'punto y coma (;)':
                  (firstLine.indexOf('\t')>-1)?'tabulación':
                  'coma (,)';
    var totalLines = rawText.split(/\r?\n/).filter(function(l){return l.trim().length>3;}).length;
    previewTitle.innerHTML = '✓ <span style="color:#10B981">'+CSV_PARSED.length+' preguntas detectadas</span>'+
      ' <span style="color:#4B5563;font-size:11px">('+totalLines+' líneas · separador: '+sepName+')</span> — Vista previa:';
    preview.style.display = 'block';
    importBtn.style.display = 'inline-flex';

    previewList.innerHTML = CSV_PARSED.slice(0,5).map(function(pq, i){
      return '<div class="card" style="margin-bottom:8px;padding:12px">'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:6px">'+(i+1)+'. '+pq.pregunta+'</div>'+
        '<div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">'+
          '<span class="tag tag-teacher" style="font-size:9px">'+pq.materia+'</span>'+
          (pq.trimestre?'<span class="tag tag-sky" style="font-size:9px">'+pq.trimestre+'</span>':'')+
          (pq.tema?'<span class="tag tag-violet" style="font-size:9px">'+pq.tema+'</span>':'')+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">'+
        pq.opciones.map(function(op, j){
          var correct = j===pq.correcta;
          return '<div style="padding:5px 10px;border-radius:6px;border:1px solid '+(correct?'#10B981':'#1E2333')+';background:'+(correct?'#10B98112':'#11141C')+';font-size:11px;color:'+(correct?'#10B981':'#6B7280')+'">'+
            ['A','B','C','D'][j]+'. '+op+(correct?' ✓':'')+
          '</div>';
        }).join('')+
        '</div>'+
      '</div>';
    }).join('')+
    (CSV_PARSED.length>5?'<div style="text-align:center;padding:10px;color:#4B5563;font-size:12px">... y '+(CSV_PARSED.length-5)+' preguntas más</div>':'');
  };
  reader.readAsText(file, 'UTF-8');
}

function csvParse(text){
  // Remove BOM if present (Excel adds this)
  text = text.replace(/^\uFEFF/, '').replace(/\r/g,'');
  var lines = text.split('\n').filter(function(l){ return l.trim().length > 3; });
  if(lines.length === 0) return [];

  // Auto-detect separator from first data line
  var testLine = lines[0];
  var sep = ',';
  var semis = (testLine.match(/;/g)||[]).length;
  var commas = (testLine.match(/,/g)||[]).length;
  var tabs = (testLine.match(/\t/g)||[]).length;
  if(semis >= 4) sep = ';';
  else if(tabs >= 4) sep = '\t';
  else sep = ',';

  // Check if first line is header - skip it
  var startLine = 0;
  var firstLower = lines[0].toLowerCase();
  if(firstLower.indexOf('pregunta')>=0 || firstLower.indexOf('question')>=0 || 
     firstLower.indexOf('enunciado')>=0 || firstLower.startsWith('p,') ||
     firstLower.startsWith('p;')){
    startLine = 1;
  }

  var result = [];
  var materias = window._teacherMaterias || [];

  for(var i=startLine; i<lines.length; i++){
    var cols = csvSplitLine(lines[i]);
    if(cols.length < 5) continue;

    var pregunta = cols[0]||'';
    var correctaText = cols[1]||'';
    var op2 = cols[2]||'';
    var op3 = cols[3]||'';
    var op4 = cols[4]||'';
    var materia = cols[5]||(materias[0]||'General');
    var trimestre = cols[6]||'todos';
    var tema = cols[7]||'';

    // Clean up
    pregunta = pregunta.replace(/^["']|["']$/g,'').trim();
    correctaText = correctaText.replace(/^["']|["']$/g,'').trim();
    op2 = op2.replace(/^["']|["']$/g,'').trim();
    op3 = op3.replace(/^["']|["']$/g,'').trim();
    op4 = op4.replace(/^["']|["']$/g,'').trim();
    materia = materia.replace(/^["']|["']$/g,'').trim();
    trimestre = trimestre.replace(/^["']|["']$/g,'').trim();
    tema = tema.replace(/^["']|["']$/g,'').trim();

    if(!pregunta||!correctaText||!op2||!op3||!op4) continue;

    // Mezclar opciones aleatoriamente
    var opciones = [correctaText, op2, op3, op4];
    // Fisher-Yates shuffle
    for(var j=opciones.length-1; j>0; j--){
      var k = Math.floor(Math.random()*(j+1));
      var tmp = opciones[j]; opciones[j]=opciones[k]; opciones[k]=tmp;
    }
    var correctaIdx = opciones.indexOf(correctaText);

    result.push({
      pregunta: pregunta,
      opciones: opciones,
      correcta: correctaIdx,
      materia: materia,
      trimestre: trimestre,
      tema: tema,
      dificultad: 'media',
    });
  }
  return result;
}

function csvSplitLine(line){
  // Auto-detect separator: semicolon (Excel español), tab, or comma
  var sep = ',';
  if(line.indexOf(';') > -1 && line.indexOf(';') < (line.indexOf(',')===-1?9999:line.indexOf(','))){
    sep = ';';
  } else if(line.indexOf('\t') > -1 && line.split('\t').length >= 5){
    sep = '\t';
  }
  // Handle quoted fields
  var result = [];
  var current = '';
  var inQuotes = false;
  for(var i=0; i<line.length; i++){
    var ch = line[i];
    if(ch==='"' || ch==="'"){
      inQuotes = !inQuotes;
    } else if(ch===sep && !inQuotes){
      result.push(current.trim());
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

function csvDoImport(){
  if(!CSV_PARSED||CSV_PARSED.length===0){
    toast('No hay preguntas para importar','err');
    return;
  }
  var btn = document.getElementById('csv-import-btn');
  if(btn){ btn.textContent='Importando...'; btn.disabled=true; }

  var materiaOverride = g('csv-materia') ? g('csv-materia').value.trim() : '';
  var trimestreOverride = g('csv-trimestre') ? g('csv-trimestre').value.trim() : '';
  var anioOverride = g('csv-anio') ? g('csv-anio').value.trim() : '';
  var updates = {};
  CSV_PARSED.forEach(function(pq){
    var ref = db.ref('banco').push().key;
    updates['banco/'+ref] = {
      pregunta: pq.pregunta,
      opciones: pq.opciones,
      correcta: pq.correcta,
      materia: materiaOverride || pq.materia || (window._teacherMaterias&&window._teacherMaterias[0]) || 'General',
      trimestre: trimestreOverride || pq.trimestre || 'todos',
      anio: anioOverride || pq.anio || 'todos',
      tema: (g('csv-tema')&&g('csv-tema').value.trim()) || pq.tema || '',
      dificultad: pq.dificultad || 'media',
      creadoPor: STATE.profile.email,
      creadoEn: Date.now(),
    };
  });

  db.ref().update(updates).then(function(){
    closeTBModal();
    toast('✓ '+CSV_PARSED.length+' preguntas importadas correctamente');
    CSV_PARSED = [];
    teacherBankLoad();
  }).catch(function(err){
    toast('Error al importar: '+err.message,'err');
    if(btn){ btn.textContent='✓ Importar todas'; btn.disabled=false; }
  });
}

  var materia = materias[0] || 'Materia';
  var csv = 'pregunta,correcta,op2,op3,op4,materia,trimestre,tema\n'+
    '¿Ejemplo de pregunta 1?,Respuesta correcta,Opción incorrecta 2,Opción incorrecta 3,Opción incorrecta 4,'+materia+',1° Trimestre,Unidad 1\n'+
    '¿Ejemplo de pregunta 2?,Respuesta correcta,Opción incorrecta 2,Opción incorrecta 3,Opción incorrecta 4,'+materia+',1° Trimestre,Unidad 1\n'+
    '¿Ejemplo de pregunta 3?,Respuesta correcta,Opción incorrecta 2,Opción incorrecta 3,Opción incorrecta 4,'+materia+',2° Trimestre,Unidad 2\n';

  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'plantilla_preguntas_tecniquiz.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('Plantilla descargada ✓');
}
